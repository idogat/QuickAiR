             oninput="dllFilters.search=this.value;applyDllFilters()">
      <label style="margin-left:12px;font-size:11px;cursor:pointer"><input type="checkbox" id="dlls-unsigned" onchange="dllFilters.unsignedOnly=this.checked;applyDllFilters()"> Unsigned only</label>
      <label style="margin-left:8px;font-size:11px;cursor:pointer"><input type="checkbox" id="dlls-private" onchange="dllFilters.privateOnly=this.checked;applyDllFilters()"> Private path only</label>
      <span id="dlls-count" style="color:var(--muted);font-size:11px;margin-left:8px"></span>

  buildDllHeader(COLS);

}

function buildDllHeader(COLS) {
  const headers = [
    { key: 'ProcessName',  label: 'Process',  numeric: false },
    { key: 'ProcessId',    label: 'PID',      numeric: true  },
    { key: 'ModuleName',   label: 'DLL Name', numeric: false },
    { key: 'ModulePath',   label: 'Path',     numeric: false },
    { key: 'FileVersion',  label: 'Version',  numeric: false },
    { key: 'Company',      label: 'Company',  numeric: false },
    { key: 'FileHash',     label: 'SHA256',   numeric: false },
    { key: 'IsPrivatePath',label: 'Private',  numeric: false },
    { key: '_signed',      label: 'Sig',      numeric: false },
    { key: '_signerCo',    label: 'Signer',   numeric: false },
  ];
  const h = el('dlls-header');
  if (!h) return;
  h.style.gridTemplateColumns = COLS;
  h.innerHTML = headers.map(hd => {
    const arrow = (sortState.tab === 'dlls' && sortState.column === hd.key)
      ? (sortState.dir === 'asc' ? '↑' : sortState.dir === 'desc' ? '↓' : '⇅') : '⇅';
    const arrowCls = (sortState.tab === 'dlls' && sortState.column === hd.key && sortState.dir !== 'none')
      ? ' class="sort-arrow ' + sortState.dir + '"' : ' class="sort-arrow"';
    return `<div class="th sortable-th" onclick="sortTable('dlls','${hd.key}',${hd.numeric})">${esc(hd.label)} <span id="sort-dlls-${hd.key}"${arrowCls}>${arrow}</span></div>`;
  }).join('');
  setTimeout(() => addResizeHandles('dlls-header', 'dlls'), 0);
}

function applyDllFilters() {
  const d = activeData(); if (!d || !d.DLLs) return;
  const lq = dllFilters.search.toLowerCase();

  let rows = d.DLLs.slice().map(e => Object.assign({}, e, {
    _signed:   e.Signature ? e.Signature.IsSigned : null,
    _signerCo: e.Signature ? (e.Signature.SignerCompany || '') : '',
  }));

  if (lq) rows = rows.filter(e =>
    str(e.ProcessName).includes(lq) ||
    str(e.ModuleName).includes(lq)  ||
    str(e.ModulePath).includes(lq)  ||
    str(e.Company).includes(lq)     ||
    str(e.ProcessId).includes(lq)   ||
    str(e.FileHash).includes(lq)    ||
    str(e._signerCo).includes(lq)   ||
    (e.Signature ? str(e.Signature.Status).includes(lq) : false)
  );
  if (dllFilters.unsignedOnly) rows = rows.filter(e => !e._signed);
  if (dllFilters.privateOnly)  rows = rows.filter(e => e.IsPrivatePath === true);
  if (sortState.tab === 'dlls' && sortState.column && sortState.dir !== 'none') {
    const numericDllCols = new Set(['ProcessId']);
    rows = applySortToRows(rows, sortState.column, numericDllCols.has(sortState.column));
  } else {
    rows.sort((a, b) => {
      const av = a[dllSort.col]; const bv = b[dllSort.col];
      if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * dllSort.dir;
      return String(av||'').localeCompare(String(bv||'')) * dllSort.dir;
    });
  }
  dllData = rows;

  const cnt = el('dlls-count');
  if (cnt) cnt.textContent = rows.length + ' entries';

  const COLS = '140px 55px 160px 220px 90px 140px 145px 55px 40px 120px';
  state.expandedRows['dlls'] = null;

  if (state.vsInstances['dlls']) {
    state.vsInstances['dlls'].update(rows);
  } else {
    state.vsInstances['dlls'] = createVS('dlls-vs', COLS, rows, renderDllRow, onDllRowClick, 'dlls');
  }
}

function renderDllRow(e, i) {

      <span class="k">SHA256</span>       <span class="v">${shaDisplay}</span>
      <span class="k">Private Path</span> <span class="v">${privBadge}</span>
      <span class="k">Signed</span>       <span class="v">${renderSignedIcon(sig2)}</span>
      ${sig2 ? `<span class="k">Sig Status</span>   <span class="v${/^PS2_/.test(sig2.Status||'')?' style="color:var(--amber)"':''}">${esc(sig2.Status||'—')}${/^PS2_/.test(sig2.Status||'')?' (unvalidated)':''}</span>
      <span class="k">IsOSBinary</span>   <span class="v" style="color:${sig2.IsOSBinary===true?'var(--green)':sig2.IsOSBinary===false?'var(--red)':'var(--muted)'}">${sig2.IsOSBinary===true?'Yes':sig2.IsOSBinary===false?'No':'—'}</span>
      <span class="k">SignatureType</span><span class="v">${esc(sig2.SignatureType||'—')}</span>
      <span class="k">SignerSubject</span> <span class="v">${esc(sig2.SignerSubject||'—')}</span>
      <span class="k">SignerCompany</span> <span class="v">${esc(sig2.SignerCompany||'—')}</span>

      ${e.reason ? `<span class="k">Reason</span><span class="v" style="color:var(--red)">${esc(e.reason)}</span>` : ''}

// ── DNS TAB ───────────────────────────────────────────────────────────────────
let dnsFilters = { search: '' };
let dnsSort    = { col: 'Entry', dir: 1 };
let dnsData    = [];

function renderDns() {
  const panel = el('panel-dns');
  const d     = activeData();
  if (!d) { panel.innerHTML = '<div class="solo-notice">No file loaded.</div>'; return; }

  const src = (d.manifest || {}).dns_source || 'cim';
  const bannerHTML = src !== 'cim'
    ? `<div class="banner warn">DNS collected via <strong>${esc(src)}</strong> — TTL values may be approximate</div>`
    : '';

  const COLS = '280px 140px 60px 60px 180px 80px';

  panel.innerHTML = `
    ${bannerHTML}
    <div id="dns-corr-summary"></div>
    <div class="filter-bar">
      <input type="text" id="dns-search" placeholder="Search hostname, IP, type&hellip;" style="width:260px"
             oninput="dnsFilters.search=this.value;applyDnsFilters()">
      <span id="dns-count" style="color:var(--muted);font-size:11px;margin-left:8px"></span>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-header" style="grid-template-columns:${COLS}" id="dns-header"></div>
      <div id="dns-vs"></div>
    </div>`;

  state.vsInstances['dns'] = null;
  buildDnsHeader(COLS);
  applyDnsFilters();
}

function buildDnsHeader(COLS) {
  const headers = [
    {key:'Entry',          label:'Entry (Hostname)'  },
    {key:'Data',           label:'Resolved IP'       },
    {key:'Type',           label:'Type'              },
    {key:'TTL',            label:'TTL'               },
    {key:'_matchedProcess',label:'Matched Process'   },
    {key:'_matchedPid',    label:'PID'               },
  ];
  const h = el('dns-header');
  if (!h) return;
  h.innerHTML = headers.map(hd => {
    const numeric = /TTL$|Pid$/.test(hd.key);
    const arrow = (sortState.tab === 'dns' && sortState.column === hd.key)
      ? (sortState.dir === 'asc' ? '↑' : sortState.dir === 'desc' ? '↓' : '⇅') : '⇅';
    const arrowCls = (sortState.tab === 'dns' && sortState.column === hd.key && sortState.dir !== 'none')
      ? ' class="sort-arrow ' + sortState.dir + '"' : ' class="sort-arrow"';
    return `<div class="th sortable-th" onclick="sortTable('dns','${hd.key}',${numeric})">${esc(hd.label)} <span id="sort-dns-${hd.key}"${arrowCls}>${arrow}</span></div>`;
  }).join('');
  setTimeout(() => addResizeHandles('dns-header', 'dns'), 0);
}

function applyDnsFilters() {
  const d  = activeData(); if (!d) return;
  const lq = dnsFilters.search.toLowerCase();

  // Build IP -> (process name, pid) map from network_tcp + network_udp
  const ipToProcMap = {};
  (d.network_tcp||[]).concat(d.network_udp||[]).forEach(c => {
    if (c.RemoteAddress && !ipToProcMap[c.RemoteAddress]) {
      ipToProcMap[c.RemoteAddress] = { name: getProcName(c.OwningProcess,d), pid: c.OwningProcess };
    }
  });

  let rows = (d.dns_cache||[]).map(e => {
    const match = e.Data ? ipToProcMap[e.Data] : null;
    return Object.assign({}, e, {
      _matchedProcess: match ? match.name : '',
      _matchedPid:     match ? match.pid  : '',
      _isMatched:      !!match,
    });
  });

  if (lq) rows = rows.filter(e =>
    str(e.Entry).includes(lq) || str(e.Data).includes(lq) ||
    str(e.Type).includes(lq)  || str(e._matchedProcess).includes(lq)
  );
  if (sortState.tab === 'dns' && sortState.column && sortState.dir !== 'none') {
    const numericDnsCols = new Set(['TTL','_matchedPid']);
    rows = applySortToRows(rows, sortState.column, numericDnsCols.has(sortState.column));
  } else {
    rows.sort((a,b) => {
      const av = a[dnsSort.col]; const bv = b[dnsSort.col];
      if (typeof av === 'number') return (av-bv)*dnsSort.dir;
      return String(av||'').localeCompare(String(bv||''))*dnsSort.dir;
    });
  }
  dnsData = rows;

  const cnt = el('dns-count');
  if (cnt) cnt.textContent = rows.length + ' entries';

  // Correlation summary
  const totalDns   = (d.dns_cache||[]).length;
  const matched    = rows.filter(e=>e._isMatched).length;
  const corrSumEl  = el('dns-corr-summary');
  if (corrSumEl) {
    corrSumEl.innerHTML = `<span>${matched}</span> of <span>${totalDns}</span> DNS entries match active connections`;
  }

  const COLS = '280px 140px 60px 60px 180px 80px';
  state.expandedRows['dns'] = null;

  if (state.vsInstances['dns']) {
    state.vsInstances['dns'].update(rows);
  } else {
    state.vsInstances['dns'] = createVS('dns-vs', COLS, rows, renderDnsRow, onDnsRowClick, 'dns');
  }
}

function renderDnsRow(e, i) {
  const rowCls = e._isMatched ? 'highlighted' : '';
  const matchLink = e._matchedPid
    ? `<a onclick="event.stopPropagation();gotoProcessPid(${e._matchedPid})">${esc(e._matchedProcess)}</a>`
    : '';
  // Row class must be set after creation; we use a data attribute trick instead
  return `
    <div class="td">${esc(e.Entry)}</div>
    <div class="td mono">${esc(e.Data||'')}</div>
    <div class="td dim">${esc(e.Type||'')}</div>
    <div class="td dim">${e.TTL||''}</div>
    <div class="td accent">${matchLink}</div>
    <div class="td dim">${esc(e._matchedPid||'')}</div>`;
}

function onDnsRowClick(i, e, rowEl) {
  if (e._matchedPid) {
    gotoProcessPid(e._matchedPid);
  }
  // highlight row
  rowEl.classList.toggle('selected');
}

function dnsSortBy(col) {
  if (dnsSort.col === col) dnsSort.dir *= -1; else { dnsSort.col = col; dnsSort.dir = 1; }
  buildDnsHeader('280px 140px 60px 60px 180px 80px');
  applyDnsFilters();
}

// ── USERS TAB ──────────────────────────────────────────────────────────────────
// Unified table — one row per unique SID, cross-host correlation via userIndex.

let usersSearch    = '';
let usersTypeFilter= 'All';
let usersConfFilter= 'All';
let usersNoDcFilter= false;
let usersData      = [];

// ── Constants ─────────────────────────────────────────────────────────────────
const CONF_ORDER = { HIGH: 0, MEDIUM: 1, LOW: 2, '?': 3, 'N/A': 4 };

const CONF_BADGE = {
  HIGH:   '<span style="color:var(--green)">&#10003; HIGH</span>',
  MEDIUM: '<span style="color:var(--amber)">~ MEDIUM</span>',
  LOW:    '<span style="color:var(--muted)">? LOW</span>',
  '?':    '<span style="color:var(--amber)">? ?</span>',
  'N/A':  '<span style="color:var(--muted)">&#8212;</span>',
};

const USER_TIPS = {
  FirstLogon:      'Earliest first logon across all machines. Source: best available of \u2014 profile folder CreationTime, NTUSER.DAT CreationTime, ProfileList registry key LastWrite time.',
  LastLogon:       'Most recent logon across all machines. Source: ProfileList LastUseTime value. Updated on each logoff.',
  WhenCreated:     'Source: Active Directory whenCreated attribute. Set when account was created on DC. Only available when DC JSON is loaded.',
  WhenCreatedDC:   'Source: AD whenCreated attribute. Accurate \u2014 set once at account creation.',
  LastLogonAD:     'Source: AD lastLogon attribute (per-DC, not replicated). Authoritative for the DC that was queried.',
  LastLogonTsAD:   'Source: AD lastLogonTimestamp (replicated). Warning: replicates every 9\u201314 days. May be stale by up to 14 days.',
  PasswordLastSet: 'Source: AD pwdLastSet attribute.',
  IsLoaded:        'ProfileList State flag (1 = currently loaded)',
  SID:             'S-1-5-21-<machine>-* = local account\nS-1-5-21-<domain>-* = domain account',
  Confidence:      'Cross-check of three sources:\n1. Profile folder CreationTime\n2. NTUSER.DAT CreationTime\n3. ProfileList registry key LastWrite\nHIGH=all agree  MEDIUM=two agree  LOW=one source  ?=none agree',
};

const UCOLS = '160px 100px 130px 110px 130px 110px 100px';

// ── Helpers ───────────────────────────────────────────────────────────────────
function confBadge(c)  { return CONF_BADGE[c] || '<span>' + esc(c || '?') + '</span>'; }
// fmtUTC moved to 03_core.js

function acctTypeBadge(t) {
  const styles = {
    Local:   'background:var(--muted);color:var(--bg)',
    Domain:  'background:var(--accent);color:var(--bg)',
    System:  'background:var(--border);color:var(--text)',
    Service: 'background:var(--border);color:var(--text)',
  };
  const s = styles[t] || 'background:var(--border);color:var(--text)';
  return '<span style="' + s + ';padding:1px 5px;border-radius:3px;font-size:10px">' + esc(t || '?') + '</span>';
}

function usersGetFirstLogon(u) {
  let best = null;
  u.machines.forEach(m => {
    if (!m.FirstLogon || !m.FirstLogon.UTC) return;
    if (!best || m.FirstLogon.UTC < best.UTC) best = m.FirstLogon;
  });
  return best;
}

function usersGetLastLogon(u) {
  let best = null;
  u.machines.forEach(m => {
    if (!m.LastLogon) return;
    if (!best || m.LastLogon > best) best = m.LastLogon;
  });
  return best;
}

function usersGetBestConf(u) {
  let best = 'N/A';
  u.machines.forEach(m => {
    const c = m.FirstLogon ? (m.FirstLogon.Confidence || 'N/A') : 'N/A';
    if ((CONF_ORDER[c] ?? 99) < (CONF_ORDER[best] ?? 99)) best = c;
  });
  return best;
}

// ── Sort ──────────────────────────────────────────────────────────────────────
function usersSortRows(rows) {
  if (!sortState.tab || sortState.tab !== 'users' || sortState.dir === 'none') return rows;
  const dir = sortState.dir === 'asc' ? 1 : -1;
  const col = sortState.column;
  return rows.slice().sort((a, b) => {
    let av, bv;
    switch (col) {
      case 'username':   av = str(a.Username); bv = str(b.Username); break;
      case 'acctType':   av = str(a.AccountType); bv = str(b.AccountType); break;
      case 'domain':     av = str(a.Domain); bv = str(b.Domain); break;
      case 'dcCreated':
        av = a.domainInfo ? (a.domainInfo.WhenCreated || '') : '';
        bv = b.domainInfo ? (b.domainInfo.WhenCreated || '') : ''; break;
      case 'firstLogin': {
        const af = usersGetFirstLogon(a); const bf = usersGetFirstLogon(b);
        av = af ? af.UTC : ''; bv = bf ? bf.UTC : ''; break;
      }
      case 'lastLogin':  av = usersGetLastLogon(a) || ''; bv = usersGetLastLogon(b) || ''; break;
      case 'confidence': {
        const ao = CONF_ORDER[usersGetBestConf(a)] ?? 99;
        const bo = CONF_ORDER[usersGetBestConf(b)] ?? 99;
        return (ao - bo) * dir;
      }
      default: av = ''; bv = '';
    }
    if (av == null && bv == null) return 0;
    if (av == null) return dir;
    if (bv == null) return -dir;
    return String(av).localeCompare(String(bv)) * dir;
  });
}

// ── Filter + render ───────────────────────────────────────────────────────────
function usersApplyFilters() {
  const idx = window.userIndex || {};
  const lq  = usersSearch.toLowerCase();

  let rows = Object.values(idx).filter(u => {
    if (lq && !str(u.Username).toLowerCase().includes(lq) &&
              !str(u.Domain).toLowerCase().includes(lq) &&
              !str(u.SID).toLowerCase().includes(lq)) return false;
    if (usersTypeFilter !== 'All' && u.AccountType !== usersTypeFilter) return false;
    if (usersConfFilter !== 'All' && usersGetBestConf(u) !== usersConfFilter) return false;
    if (usersNoDcFilter) {
      if (u.AccountType !== 'Domain') return false;
      if (u.domainInfo) return false;
    }
    return true;
  });

  if (sortState.tab !== 'users' || sortState.dir === 'none') {
    rows.sort((a, b) => str(a.Username).localeCompare(str(b.Username)));
  } else {
    rows = usersSortRows(rows);
  }
  usersData = rows;

  const cnt = el('users-count');
  if (cnt) cnt.textContent = rows.length + ' users';

  if (state.vsInstances['users']) {
    state.vsInstances['users'].update(rows);
  } else {
    state.vsInstances['users'] = createVS('users-vs', UCOLS, rows, renderUserRow, onUserRowClick, 'users');
  }
}

             oninput="usersSearch=this.value;usersApplyFilters()">
      <select id="users-type-filter" onchange="usersTypeFilter=this.value;usersApplyFilters()">
        <option value="All">All Types</option>

      </select>
      <select id="users-conf-filter" onchange="usersConfFilter=this.value;usersApplyFilters()">
        <option value="All">All Confidence</option>

      </select>
      <label style="font-size:12px;cursor:pointer">

      </label>
      <span id="users-count" style="color:var(--muted);font-size:11px;margin-left:4px"></span>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-header" style="grid-template-columns:${UCOLS}" id="users-header">
        <div class="th sortable-th" onclick="sortTable('users','username',false)">Username <span class="sort-arrow" id="sort-users-username">&#8645;</span></div>
        <div class="th sortable-th" onclick="sortTable('users','acctType',false)">Account Type <span class="sort-arrow" id="sort-users-acctType">&#8645;</span></div>
        <div class="th sortable-th" onclick="sortTable('users','domain',false)">Domain <span class="sort-arrow" id="sort-users-domain">&#8645;</span></div>
        <div class="th sortable-th" title="${esc(USER_TIPS.WhenCreated)}" onclick="sortTable('users','dcCreated',false)">Created (DC) <span class="sort-arrow" id="sort-users-dcCreated">&#8645;</span></div>
        <div class="th sortable-th" title="${esc(USER_TIPS.FirstLogon)}" onclick="sortTable('users','firstLogin',false)">First Login <span class="sort-arrow" id="sort-users-firstLogin">&#8645;</span></div>
        <div class="th sortable-th" title="${esc(USER_TIPS.LastLogon)}" onclick="sortTable('users','lastLogin',false)">Last Login <span class="sort-arrow" id="sort-users-lastLogin">&#8645;</span></div>
        <div class="th sortable-th" title="${esc(USER_TIPS.Confidence)}" onclick="sortTable('users','confidence',false)">Confidence <span class="sort-arrow" id="sort-users-confidence">&#8645;</span></div>

}

// ── Row render ────────────────────────────────────────────────────────────────
function renderUserRow(u) {
  const bestConf = usersGetBestConf(u);
  const fl       = usersGetFirstLogon(u);
  const lastLogon= usersGetLastLogon(u);
  const dcDate   = u.domainInfo ? fmtUTC(u.domainInfo.WhenCreated) : (
    u.AccountType === 'Local'
      ? '<span style="color:var(--muted)" title="Local accounts have no AD creation date">?</span>'
      : '<span style="color:var(--muted)">&#8212;</span>'
  );

  let firstLoginCell;
  if (fl) {
    firstLoginCell = fmtUTC(fl.UTC) + ' ' + confBadge(fl.Confidence);
  } else {
    firstLoginCell = '<span style="color:var(--muted)">&#8212;</span>';
  }

  return `
    <div class="td mono" title="${esc(USER_TIPS.SID)}\nSID: ${esc(u.SID)}">${esc(u.Username || u.SID)}</div>

// ── Row click ─────────────────────────────────────────────────────────────────
function onUserRowClick(i, u, rowEl) {

// ── Row expand ────────────────────────────────────────────────────────────────
function buildUserExpand(u) {
  let html = '<div style="padding:10px 14px">';

  // ── SECTION 1: IDENTITY ──
  html += `
    <h4 style="margin:0 0 6px">Identity</h4>
    <div class="kv-grid" style="margin-bottom:12px">
      <span class="k" title="${esc(USER_TIPS.SID)}">SID</span>
        <span class="v mono" style="font-size:11px;cursor:pointer" onclick="navigator.clipboard&&navigator.clipboard.writeText('${esc(u.SID)}')" title="Click to copy">${esc(u.SID)}</span>

      <span class="k">Domain</span>
        <span class="v">${esc(u.Domain || '&#8212;')}</span>`;

  if (u.SIDMetadata && u.SIDMetadata.WellKnown) {
    html += `
      <span class="k">Well-Known</span>
        <span class="v" style="color:var(--amber)">${esc(u.SIDMetadata.Description)}</span>`;
  }
  if (u.HasLocalAccount) {
    const disStr = u.LocalDisabled === true ? ' <span style="color:var(--amber)">(disabled)</span>' : '';
    html += `
      <span class="k">Local Account</span>
        <span class="v" style="color:var(--green)">&#10003; exists${disStr}</span>`;
  }

  // Collect group memberships from all machines + DC domain info
  const allGroups = new Set();
  u.machines.forEach(m => (m.GroupMemberships || []).forEach(g => allGroups.add(g)));
  if (u.domainInfo && u.domainInfo.MemberOf) u.domainInfo.MemberOf.forEach(g => allGroups.add(g));
  if (allGroups.size > 0) {
    const badges = Array.from(allGroups).sort().map(g => {
      const isAdmin = /^(Administrators|Domain Admins|Enterprise Admins|Schema Admins)$/i.test(g);
      const style = isAdmin
        ? 'background:rgba(255,100,50,0.15);border:1px solid var(--red);color:var(--red)'
        : 'background:var(--surface);border:1px solid var(--border);color:var(--text)';
      return '<span style="' + style + ';padding:1px 6px;border-radius:3px;font-size:10px;margin:1px 2px;display:inline-block">' + esc(g) + '</span>';
    }).join(' ');
    html += `
      <span class="k">Groups</span>
        <span class="v">${badges}</span>`;
  }
  html += '</div>';

  // ── SECTION 2: DOMAIN INFO ──
  if (u.domainInfo) {
    const di  = u.domainInfo;
    const src = di.Source || '?';
    const srcColor = src === 'Get-ADUser' ? 'var(--green)' : 'var(--accent)';
    html += `
      <h4 style="margin:0 0 6px">Domain Info
        <span style="background:rgba(0,0,0,.3);border:1px solid var(--border);padding:1px 6px;border-radius:3px;font-size:10px;color:${srcColor};margin-left:8px">${esc(src)}</span>
        <span style="color:var(--muted);font-size:11px;margin-left:6px">From DC: ${esc(di.dcHost)}</span>
      </h4>
      <div class="kv-grid" style="margin-bottom:12px">
        <span class="k" title="${esc(USER_TIPS.WhenCreatedDC)}">Created</span>
          <span class="v" title="${esc(USER_TIPS.WhenCreatedDC)}">${fmtUTC(di.WhenCreated)}</span>
        <span class="k" title="${esc(USER_TIPS.LastLogonAD)}">Last Logon (AD, per-DC)</span>
          <span class="v" title="${esc(USER_TIPS.LastLogonAD)}">${fmtUTC(di.LastLogonAD)}</span>
        <span class="k" title="${esc(USER_TIPS.LastLogonTsAD)}">Last Logon (AD, replicated)</span>
          <span class="v" title="${esc(USER_TIPS.LastLogonTsAD)}">${fmtUTC(di.LastLogonTimestampAD)}</span>
        <span class="k" title="${esc(USER_TIPS.PasswordLastSet)}">Password Last Set</span>
          <span class="v" title="${esc(USER_TIPS.PasswordLastSet)}">${fmtUTC(di.PasswordLastSet)}</span>
        <span class="k">Enabled</span>
          <span class="v" style="color:${di.Enabled?'var(--green)':'var(--red)'}">${di.Enabled ? '&#10003;' : '&#10007;'}</span>
        <span class="k">Locked Out</span>
          <span class="v" style="color:${di.LockedOut?'var(--red)':'var(--muted)'}">${di.LockedOut ? 'YES' : '&#8212;'}</span>
        <span class="k">Bad Logon Count</span>
          <span class="v" style="color:${(di.BadLogonCount>0)?'var(--amber)':'var(--muted)'}">${di.BadLogonCount || 0}</span>
      </div>`;
  } else if (u.AccountType === 'Domain') {
    html += `
      <div style="background:rgba(255,180,0,.08);border:1px solid var(--amber);border-radius:4px;padding:7px 10px;margin-bottom:12px;font-size:12px;color:var(--amber)">
        No DC data &#8212; load DC JSON to see account creation date</div>`;
  } else if (u.AccountType === 'Local') {
    html += `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:7px 10px;margin-bottom:12px;font-size:12px;color:var(--muted)">
        Local account &#8212; no AD data available</div>`;
  }

  // ── SECTION 3: MACHINE APPEARANCES ──
  if (u.machines.length > 0) {
    html += `
      <h4 style="margin:0 0 6px">Machine Appearances (${u.machines.length})</h4>
      <table class="expand-tbl" style="margin-bottom:10px">
        <tr>
          <th>Machine</th>
          <th title="${esc(USER_TIPS.FirstLogon)}">First Login</th>
          <th title="${esc(USER_TIPS.LastLogon)}">Last Login</th>
          <th>Profile Path</th>
          <th title="${esc(USER_TIPS.IsLoaded)}">Loaded</th>
        </tr>`;

    u.machines.forEach(m => {
      const fl  = m.FirstLogon || {};
      const pf  = fl.ProfileFolder || {};
      const nt  = fl.NTUserDat || {};
      const rk  = fl.RegistryKey || {};
      const tip = 'Profile folder CreationTime:\n  ' + (pf.Value || 'N/A') +
                  '\nNTUSER.DAT CreationTime:\n  ' + (nt.Value || 'N/A') +
                  '\nProfileList key LastWrite\n  (' + (rk.KeyPath || 'HKLM\\...\\ProfileList\\<SID>') + '):\n  ' + (rk.Value || 'N/A') +
                  '\nConfidence: ' + (fl.Confidence || '?');
      const lastTip = 'Source: ProfileList LastUseTime.\nPath: HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\ProfileList\\' + (u.SID || '<SID>') + '\\LastUseTime\nUpdated on each logoff.';
      const profPathFull = m.ProfilePath || '';
      const profPathShort= profPathFull.length > 38 ? '&#8230;' + esc(profPathFull.slice(-36)) : esc(profPathFull || '&#8212;');

      html += `<tr>
        <td>${esc(m.hostname)}</td>
        <td title="${esc(tip)}">${fl.UTC ? fmtUTC(fl.UTC) : '<span style="color:var(--muted)">&#8212;</span>'} ${confBadge(fl.Confidence)}</td>
        <td title="${esc(lastTip)}">${fmtUTC(m.LastLogon)}</td>
        <td class="mono" style="font-size:10px" title="${esc(profPathFull)}">${profPathShort}</td>
        <td style="text-align:center">${m.IsLoaded ? '<span style="color:var(--green)">&#10003;</span>' : '<span style="color:var(--muted)">&#8212;</span>'}</td>
      </tr>`;

      if (fl.TimestampMismatch) {
        html += `<tr><td colspan="5" style="color:var(--amber);font-size:11px">? Timestamp mismatch across sources</td></tr>`;
      }
    });

    html += '</table>';
  }

  html += '</div>';
  return html;
}

var _bulkSel = {};          // { hostname: { mem, disk } }
var _toolsManifest       = null;   // cached tools.json data
var _toolsManifestLoaded = false;  // true once fetch attempt completed
var _qmRemoteDestModified = false; // legacy — kept for _execTabRemoteDestModified compat

function _loadToolsManifest(callback) {
  if (!_toolsManifestLoaded) {
    _toolsManifest = (typeof _embeddedToolsManifest !== 'undefined') ? _embeddedToolsManifest : null;
    _toolsManifestLoaded = true;
  }
  callback(_toolsManifest);
}

function _getCollectionStatus(hostname) {
  var d = state.hosts[hostname];
  if (!d || !d.manifest) return { status: 'nodata', label: 'No data', cls: 'exec-status-nodata', errors: [], warnings: [] };
  var m = d.manifest;
  var all = m.collection_errors || [];
  var warnings = all.filter(function(e) { return e && e.severity === 'warning'; });
  var errors   = all.filter(function(e) { return !e || e.severity !== 'warning'; });
  if (m.collection_failed === true) return { status: 'failed', label: 'Failed', cls: 'exec-status-failed', errors: errors, warnings: warnings };
  if (errors.length > 0) return { status: 'partial', label: 'Partial (' + errors.length + ' errors)', cls: 'exec-status-partial', errors: errors, warnings: warnings };
  if (warnings.length > 0) return { status: 'complete', label: 'Complete (' + warnings.length + ' warnings)', cls: 'exec-status-complete', errors: errors, warnings: warnings };
  return { status: 'complete', label: 'Complete', cls: 'exec-status-complete', errors: [], warnings: [] };
}

function _getWinRMStatus(hostname) {
  var d = state.hosts[hostname];
  if (!d || !d.manifest) return { status: 'unknown', label: 'Unknown', cls: 'exec-winrm-unknown' };
  var m = d.manifest;
  if (m.winrm_reachable === true)  return { status: 'reachable',   label: 'Reachable',   cls: 'exec-winrm-reach'   };
  if (m.winrm_reachable === false) return { status: 'unreachable', label: 'Unreachable', cls: 'exec-winrm-unreach' };
  // Infer from collection data: null + no real errors + processes present → reachable
  var realErrors = (m.collection_errors || []).filter(function(e) { return !e || e.severity !== 'warning'; });
  var procCount = (d.Processes && d.Processes.length) ? d.Processes.length : 0;
  if (realErrors.length === 0 && procCount > 0) return { status: 'reachable', label: 'Reachable', cls: 'exec-winrm-reach' };
  return { status: 'unknown', label: 'Unknown', cls: 'exec-winrm-unknown' };
}

function _getExecuteBadgeInfo() {
  var hosts = Object.keys(state.hosts);
  var partial = 0, failed = 0;
  hosts.forEach(function(h) {
    var cs = _getCollectionStatus(h);
    if (cs.status === 'failed')       failed++;
    else if (cs.status === 'partial') partial++;
  });
  return { count: partial + failed, failed: failed, partial: partial };
}

function updateExecuteBadge() {
  var btn = el('tab-execute');
  if (!btn) return;
  var existing = btn.querySelector('.tab-badge');
  if (existing) existing.remove();
  var info = _getExecuteBadgeInfo();
  if (info.count > 0) {
    var badge = document.createElement('span');
    badge.className = 'tab-badge' + (info.failed > 0 ? ' red' : '');
    badge.textContent = info.count;
    btn.appendChild(badge);
  }
}

function renderExecute() {
  var panel = el('panel-execute');
  if (!panel) return;
  var hosts = Object.keys(state.hosts);

    sec1HTML = '<div class="exec-no-hosts">Load a JSON file to see host status.</div>';

    // Initialise bulk-selection state for any new hosts
    hosts.forEach(function(h) {
      if (!_bulkSel[h]) _bulkSel[h] = { mem: false, disk: false };
    });
    var rows = hosts.map(function(h) {
      var d  = state.hosts[h];
      var m  = (d && d.manifest) || {};

        ? '<div class="exec-winrm-notice">WinRM unreachable during collection. Execution may still be possible with different credentials or method.</div>'

      return '<tr id="exec-row-' + esc(h) + '">' +

        '<td class="mono dim">' + esc(shareInfo) + '</td>' +
        '<td class="exec-type-col"><input type="checkbox" id="exc-mem-' + esc(h) + '"' + (bs.mem ? ' checked' : '') + ' onchange="execBulkMemCheck(\'' + esc(h) + '\')"></td>' +
        '<td class="exec-type-col"><input type="checkbox" id="exc-dsk-' + esc(h) + '"' + (bs.disk ? ' checked' : '') + ' onchange="execBulkDiskCheck(\'' + esc(h) + '\')"></td>' +

        '<th class="exec-type-col exec-th-toggle" onclick="execBulkToggleMem()" title="Toggle Memory on selected rows">Memory</th>' +
        '<th class="exec-type-col exec-th-toggle" onclick="execBulkToggleDisk()" title="Toggle Disk on selected rows">Disk</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
      '</table>' +
      '<div class="exec-bulk-bar">' +
        '<div class="exec-bulk-left">' +
          '<span id="exec-sel-counter" class="exec-sel-counter" style="display:none"></span>' +
        '</div>' +
        '<button class="exec-add-queue-btn" id="exec-add-queue-btn" onclick="execBulkAddToQueue()" disabled>Add to Queue &#8594;</button>' +
      '</div>';
  }

  panel.innerHTML =
    '<div id="exec-setup-banner" style="display:none" class="exec-setup-banner">&#8505; To use launcher: run <strong>Register-QuickAiRProtocol.ps1</strong> once as Administrator.</div>' +
    '<div class="exec-section">' +
      '<div class="exec-section-hdr" onclick="execToggleSection(\'exec-sec1-body\')">' +
        '<span class="exec-sec-arrow" id="exec-sec1-arrow">&#9660;</span>Select Hosts' +
      '</div>' +
      '<div class="exec-section-body" id="exec-sec1-body">' + sec1HTML + '</div>' +
    '</div>';

  _execEnsureQueueModal();
  _execUpdateSelCounter();
  _loadToolsManifest(function(manifest) {
    var banner = el('exec-setup-banner');
    if (banner && manifest) banner.style.display = '';
  });
}

// ── BULK SELECTION HANDLERS ───────────────────────────────────────────────────


function execBulkMemCheck(hostname) {
  var cb = el('exc-mem-' + hostname);
  if (!cb || !_bulkSel[hostname]) return;
  _bulkSel[hostname].mem = cb.checked;
  _execUpdateSelCounter();
}

function execBulkDiskCheck(hostname) {
  var cb = el('exc-dsk-' + hostname);
  if (!cb || !_bulkSel[hostname]) return;
  _bulkSel[hostname].disk = cb.checked;
  _execUpdateSelCounter();
}

function execBulkToggleMem() {
  var hosts = Object.keys(_bulkSel);
  if (hosts.length === 0) return;
  var allOn = hosts.every(function(h) { return _bulkSel[h].mem; });
  hosts.forEach(function(h) {
    _bulkSel[h].mem = !allOn;
    var cb = el('exc-mem-' + h);
    if (cb) cb.checked = !allOn;
  });
  _execUpdateSelCounter();
}

function execBulkToggleDisk() {
  var hosts = Object.keys(_bulkSel);
  if (hosts.length === 0) return;
  var allOn = hosts.every(function(h) { return _bulkSel[h].disk; });
  hosts.forEach(function(h) {
    _bulkSel[h].disk = !allOn;
    var cb = el('exc-dsk-' + h);
    if (cb) cb.checked = !allOn;
  });
  _execUpdateSelCounter();
}

function _execUpdateSelCounter() {
  var memJobs = 0, diskJobs = 0;
  Object.keys(_bulkSel).forEach(function(h) {
    var bs = _bulkSel[h];
    if (bs.mem)  memJobs++;
    if (bs.disk) diskJobs++;
  });
  var counter = el('exec-sel-counter');
  if (counter) {
    if (memJobs + diskJobs > 0) {
      counter.style.display = '';
      counter.textContent = memJobs + ' memory job' + (memJobs === 1 ? '' : 's') + ', ' +
        diskJobs + ' disk job' + (diskJobs === 1 ? '' : 's');
    } else {
      counter.style.display = 'none';
    }
  }
  var qBtn = el('exec-add-queue-btn');
  if (qBtn) qBtn.disabled = (memJobs + diskJobs === 0);
}

function _execEnsureQueueModal() {
  if (document.getElementById('queue-modal')) return;
  var backdrop = document.createElement('div');
  backdrop.id = 'queue-modal-backdrop';
  backdrop.addEventListener('click', function(e) {
    if (e.target === backdrop) _closeQueueModal();
  });
  document.body.appendChild(backdrop);
  var modal = document.createElement('div');
  modal.id = 'queue-modal';
  modal.innerHTML =
    '<div class="qm-header">' +
      '<span class="qm-title" id="qm-title">Queue Preview</span>' +
      '<button class="qm-close" onclick="_closeQueueModal()">\u00d7</button>' +
    '</div>' +
    '<div class="qm-body" id="qm-body"></div>' +
    '<div class="qm-actions" id="qm-actions"></div>';
  document.body.appendChild(modal);
}

function execBulkAddToQueue() {
  _execEnsureQueueModal();
  var jobs = [];
  Object.keys(_bulkSel).sort().forEach(function(h) {
    var bs = _bulkSel[h];
    if (bs.mem)  jobs.push({ target: h, tool: 'memory' });
    if (bs.disk) jobs.push({ target: h, tool: 'disk'   });
  });
  if (jobs.length === 0) return;

  // Title
  var titleEl = el('qm-title');
  if (titleEl) titleEl.textContent = 'Queue Preview \u2014 ' + jobs.length + ' job' + (jobs.length === 1 ? '' : 's');

  // Show modal immediately, body will be filled once manifest loads
  window._queueJobs = jobs;
  _qmRemoteDestModified = false;
  var bk = el('queue-modal-backdrop');
  var md = el('queue-modal');
  if (bk) bk.classList.add('show');
  if (md) md.classList.add('show');

  var body = el('qm-body');
  if (body) body.innerHTML = '<div style="color:var(--muted);padding:8px 0;font-size:12px">Loading tools\u2026</div>';

  var hasMemJobs  = jobs.some(function(j) { return j.tool === 'memory'; });
  var hasDiskJobs = jobs.some(function(j) { return j.tool === 'disk';   });

  _loadToolsManifest(function(manifest) {
    _execBuildQueueModalBody(jobs, hasMemJobs, hasDiskJobs, manifest);
  });
}

// Builds the category display label shown in dropdown options
function _toolCatLabel(cat) {
  var map = { 'memory': 'Memory', 'disk': 'Disk', 'memory+disk': 'Memory+Disk', 'custom': 'Custom' };
  return map[cat] || 'Custom';
}

// Builds a binary field (dropdown or text input) for the given type ('mem' or 'disk')
// preselect: optional path string to pre-select in the dropdown
function _buildBinField(type, label, manifest, preselect) {
  var relevant = [];
  if (manifest && manifest.tools) {
    manifest.tools.forEach(function(t) {
      var cat = t.category || 'custom';
      if (type === 'mem'  && (cat === 'memory' || cat === 'memory+disk' || cat === 'custom')) relevant.push(t);
      if (type === 'disk' && (cat === 'disk'   || cat === 'memory+disk' || cat === 'custom')) relevant.push(t);
    });
  }
  if (relevant.length > 0) {
    var hasPreselect = false;
    if (preselect) {
      var norm = preselect.replace(/\//g, '\\').toLowerCase();
      relevant.forEach(function(t) { if (t.path.toLowerCase() === norm) hasPreselect = true; });
    }
    var opts = hasPreselect ? '' : '<option value="" disabled selected>-- Select tool --</option>';
    opts += relevant.map(function(t) {
      var sel = (hasPreselect && t.path.toLowerCase() === preselect.replace(/\//g, '\\').toLowerCase()) ? ' selected' : '';
      return '<option value="' + esc(t.path) + '"' + sel + '>' + esc(t.filename) + ' (' + _toolCatLabel(t.category) + ')</option>';
    }).join('');
    opts += '<option value="__browse__">Browse\u2026</option>';
    return '<div class="qm-field"><label>' + label + '</label>' +
      '<div class="qm-bin-wrap">' +
        '<select id="qm-' + type + '-bin" onchange="_qmBinChange(\'' + type + '\')">' + opts + '</select>' +
        '<input type="text" id="qm-' + type + '-bin-custom" style="display:none" placeholder="Enter path manually">' +
      '</div>' +
    '</div>';
  }
  // Fallback: plain text input (pre-fill with default if provided)
  var val = preselect ? ' value="' + esc(preselect) + '"' : '';
  return '<div class="qm-field"><label>' + label + '</label>' +
    '<input type="text" id="qm-' + type + '-bin"' + val + ' placeholder="Run Get-ToolsManifest.ps1 to populate tool list"></div>';
}

// Returns the effective binary path for the given type ('mem' or 'disk')
function _qmGetBinValue(type) {
  var sel = el('qm-' + type + '-bin');
  if (!sel) return '';
  if (sel.tagName === 'SELECT') {
    if (sel.value === '__browse__') {
      var custom = el('qm-' + type + '-bin-custom');
      return custom ? custom.value : '';
    }
    return sel.value;
  }
  return sel.value;
}

// Called when a binary dropdown changes — updates remote dest for matching rows
function _qmBinChange(type) {
  var sel    = el('qm-' + type + '-bin');
  var custom = el('qm-' + type + '-bin-custom');
  if (!sel) return;
  if (sel.value === '__browse__') {
    if (custom) { custom.style.display = ''; custom.focus(); }
    return;
  }
  if (custom) custom.style.display = 'none';
  // Update remote dest for all rows of this tool type (unless manually edited)
  var toolMatch = (type === 'mem') ? 'memory' : 'disk';
  var fname = sel.value.split('\\').pop();
  if (!fname) return;
  var jobs = window._queueJobs || [];
  jobs.forEach(function(j, idx) {
    if (j.tool === toolMatch && !_qmRowRdModified[idx]) {
      var rdEl = el('qm-rd-' + idx);
      if (rdEl) rdEl.value = 'C:\\Windows\\Temp\\' + fname;
    }
  });
}

// Per-row tracking: which remote-dest inputs were manually edited
var _qmRowRdModified = {};

function _qmToggleSmb(idx) {
  var meth = (el('qm-method-' + idx) || {}).value;
  var cell = el('qm-smb-cell-' + idx);
  if (cell) cell.style.display = (meth === 'WinRM' || meth === 'WMI') ? 'none' : '';
}

function _qmApplyInitialSmbVisibility(jobs) {
  for (var i = 0; i < jobs.length; i++) _qmToggleSmb(i);
}

function _execBuildQueueModalBody(jobs, hasMemJobs, hasDiskJobs, manifest) {
  var defaults = (typeof _toolDefaults !== 'undefined') ? _toolDefaults : null;
  var memDef  = defaults && defaults.memory ? defaults.memory : null;
  var diskDef = defaults && defaults.disk   ? defaults.disk   : null;
  _qmRowRdModified = {};

  // Binary fields
  var memField = '';
  if (hasMemJobs) {
    var memPreselect = (memDef && memDef.binary) ? memDef.binary : null;
    memField = _buildBinField('mem', 'Memory Binary', manifest, memPreselect);
  }
  var diskField = '';
  if (hasDiskJobs) {
    var diskPreselect = (diskDef && diskDef.binary) ? diskDef.binary : null;
    diskField = _buildBinField('disk', 'Disk Binary', manifest, diskPreselect);
  }

  // Compute per-tool defaults
  var memRdDefault   = (memDef  && memDef.remoteDest)  ? memDef.remoteDest  : 'C:\\Windows\\Temp\\tool.exe';
  var diskRdDefault  = (diskDef && diskDef.remoteDest)  ? diskDef.remoteDest  : 'C:\\Windows\\Temp\\tool.exe';
  var memArgsDefault  = (memDef  && memDef.arguments)  ? memDef.arguments  : '';
  var diskArgsDefault = (diskDef && diskDef.arguments)  ? diskDef.arguments  : '';
  var memMethodDef    = (memDef  && memDef.method)     ? memDef.method     : 'Auto';
  var diskMethodDef   = (diskDef && diskDef.method)     ? diskDef.method     : 'Auto';
  var memAliveDef     = (memDef  && memDef.aliveCheck)  ? memDef.aliveCheck  : 30;
  var diskAliveDef    = (diskDef && diskDef.aliveCheck)  ? diskDef.aliveCheck  : 30;

  // If no defaults, try manifest for remoteDest
  if (!memDef && manifest && manifest.tools) {
    manifest.tools.forEach(function(t) {
      var cat = t.category || 'custom';
      if (memRdDefault === 'C:\\Windows\\Temp\\tool.exe' && (cat === 'memory' || cat === 'memory+disk'))
        memRdDefault = 'C:\\Windows\\Temp\\' + t.filename;
    });
  }
  if (!diskDef && manifest && manifest.tools) {
    manifest.tools.forEach(function(t) {
      var cat = t.category || 'custom';
      if (diskRdDefault === 'C:\\Windows\\Temp\\tool.exe' && (cat === 'disk' || cat === 'memory+disk'))
        diskRdDefault = 'C:\\Windows\\Temp\\' + t.filename;
    });
  }

  // Build per-row editable table
  function methodOpts(selected) {
    return ['Auto', 'WinRM', 'SMB+WMI', 'WMI'].map(function(m) {
      return '<option value="' + m + '"' + (m === selected ? ' selected' : '') + '>' + m + '</option>';
    }).join('');
  }

  var settingsRows = jobs.map(function(j, idx) {
    var isMem = (j.tool === 'memory');
    var rd    = isMem ? memRdDefault   : diskRdDefault;
    var args  = isMem ? memArgsDefault : diskArgsDefault;
    var meth  = isMem ? memMethodDef   : diskMethodDef;
    var alive = isMem ? memAliveDef    : diskAliveDef;
    return '<tr>' +
      '<td class="qm-cell-host">' + esc(j.target) + '</td>' +
      '<td class="qm-cell-type">' + (isMem ? 'Memory' : 'Disk') + '</td>' +
      '<td><input id="qm-rd-' + idx + '" value="' + esc(rd) + '" ' +
        'oninput="_qmRowRdModified[' + idx + ']=true" placeholder="C:\\Windows\\Temp\\tool.exe"></td>' +
      '<td><input id="qm-args-' + idx + '" value="' + esc(args) + '" placeholder="optional"></td>' +
      '<td><select id="qm-method-' + idx + '" onchange="_qmToggleSmb(' + idx + ')">' + methodOpts(meth) + '</select></td>' +
      '<td class="qm-smb-cell" id="qm-smb-cell-' + idx + '"><input id="qm-smb-' + idx + '" value="" placeholder="\\\\target\\ShareName (auto-detect if empty)" style="width:160px"></td>' +
      '<td><input type="number" id="qm-alive-' + idx + '" value="' + alive + '" min="1" max="3600" style="width:60px"></td>' +
      '</tr>';
  }).join('');

  var body = el('qm-body');
  if (body) body.innerHTML =
    '<div class="qm-section-title">Tool Binaries</div>' +
    memField + diskField +
    '<div class="qm-section-title">Job Settings</div>' +
    '<div class="qm-settings-wrap">' +
      '<table class="qm-settings-tbl">' +
        '<thead><tr>' +
          '<th>Host</th><th>Type</th><th>Remote Destination</th>' +
          '<th>Arguments</th><th>Method</th><th>Custom Share</th><th>Alive</th>' +
        '</tr></thead>' +
        '<tbody>' + settingsRows + '</tbody>' +
      '</table>' +
    '</div>';

  var actions = el('qm-actions');
  if (actions) actions.innerHTML =
    '<button onclick="_closeQueueModal()">Cancel</button>' +
    '<button class="qm-btn-launch" onclick="_queueModalLaunch()">Launch All &#8594;</button>';

  // Set initial visibility of Custom Share cells based on method
  _qmApplyInitialSmbVisibility(jobs);
}

function _closeQueueModal() {
  var bk = el('queue-modal-backdrop');
  var md = el('queue-modal');
  if (bk) bk.classList.remove('show');
  if (md) md.classList.remove('show');
}

function _queueModalLaunch() {
  var jobs      = window._queueJobs || [];
  var memBin    = _qmGetBinValue('mem');
  var diskBin   = _qmGetBinValue('disk');
  var payload = jobs.map(function(j, idx) {
    return {
      target:     j.target,
      type:       j.tool === 'memory' ? 'Memory' : 'Disk',
      binary:     j.tool === 'memory' ? memBin : diskBin,
      remoteDest: (el('qm-rd-' + idx) || {}).value || '',
      arguments:  (el('qm-args-' + idx) || {}).value || '',
      method:     (el('qm-method-' + idx) || {}).value || 'Auto',
      remoteShare: (el('qm-smb-' + idx) || {}).value || '',
      aliveCheck: parseInt((el('qm-alive-' + idx) || {}).value || '30', 10) || 30
    };
  });
  var encoded = encodeURIComponent(btoa(JSON.stringify(payload)));
  var uri = 'quickair://batch?jobs=' + encoded;
  window.location.href = uri;
  // Show success
  var body = el('qm-body');
  if (body) {
    var ok = document.createElement('div');
    ok.className = 'qm-success';
    ok.innerHTML = '<strong>quickair:// URI sent to Windows.</strong><br>If QuickAiRLaunch.ps1 does not open: Run <code>Register-QuickAiRProtocol.ps1</code> as Administrator first.';
    body.insertBefore(ok, body.firstChild);
  }
  var actions = el('qm-actions');
  if (actions) actions.innerHTML = '<button onclick="_closeQueueModal()">Close</button>';
}

function execToggleSection(bodyId) {
  var body = el(bodyId);
  if (!body) return;
  var nowCollapsed = body.classList.toggle('collapsed');
  var arrow = el('exec-sec1-arrow');
  if (arrow) arrow.innerHTML = nowCollapsed ? '&#9654;' : '&#9660;';
}

function renderFleetExecBanners() {
  var wrap = el('fleet-exec-banners');
  if (!wrap) return;
  var hosts = Object.keys(state.hosts);
  var banners = hosts.filter(function(h) {
    var cs = _getCollectionStatus(h);
    return cs.status === 'partial' || cs.status === 'failed';
  }).map(function(h) {
    var cs  = _getCollectionStatus(h);
    var errCount = (cs.errors || []).length;
    var tooltip = (cs.errors || []).map(function(e) {
      return (e && e.artifact ? e.artifact + ': ' : '') + (e && e.message ? e.message : String(e));
    }).join('\n');
    var tipAttr = tooltip ? ' title="' + esc(tooltip) + '" style="cursor:help"' : '';
    return '<div class="fleet-err-banner">' +
      '&#9888; <strong>' + esc(h) + '</strong> &mdash; collection ' + (cs.status === 'failed' ? 'failed' : 'incomplete') + '.' +
      (errCount > 0 ? ' <span' + tipAttr + '>' + errCount + ' error' + (errCount === 1 ? '' : 's') + ' recorded.</span>' : '') +
      ' Use the EXECUTE tab to run memory or disk collection directly.' +
      ' &nbsp;<a onclick="switchTab(\'execute\')">Go to Execute tab</a>' +
      '</div>';
  }).join('');
  wrap.innerHTML = banners;
}
