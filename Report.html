<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickAiR</title>
<style>
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #30363d;
  --accent:  #58a6ff;
  --green:   #3fb950;
  --amber:   #d29922;
  --red:     #f85149;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --blue-hi: #1f3a5c;
  --row-alt: #0d1117;
  --row-hov: #1c2128;
  --expand:  #1a2332;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Consolas','Courier New',monospace;font-size:13px;min-width:1280px;overflow-x:auto}
a{color:var(--accent);cursor:pointer;text-decoration:none}
a:hover{text-decoration:underline}
button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;cursor:pointer;font-family:inherit;font-size:12px;border-radius:3px}
button:hover{border-color:var(--accent);color:var(--accent)}
button.active{background:var(--accent);color:#0d1117;border-color:var(--accent)}
input,select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;font-family:inherit;font-size:12px;border-radius:3px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}

/* TOP BAR */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
#topbar h1{font-size:14px;color:var(--accent);white-space:nowrap}
#topbar .sep{color:var(--border);user-select:none}
#hostSelectorWrap{min-width:160px}
#globalSearch{width:200px}
.badge{background:var(--bg);border:1px solid var(--border);padding:3px 8px;border-radius:3px;font-size:11px;white-space:nowrap}
.badge span{color:var(--accent);font-weight:bold}
.badge.src-badge{color:var(--muted);font-size:10px}
#collectionMeta{color:var(--muted);font-size:11px;white-space:nowrap}

/* TABS */
#tabbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:0}
.tab-btn{background:var(--surface)!important;border:none!important;border-bottom:2px solid transparent!important;padding:8px 20px;color:var(--muted)!important;font-size:13px;border-radius:0;font-family:inherit}
.tab-btn:hover{color:#e6edf3!important;background:var(--surface)!important}
.tab-btn.active{background:var(--accent)!important;color:#fff!important;border-bottom-color:var(--accent)!important}

/* PANELS */
.tab-panel{display:none;padding:12px 16px}
.tab-panel.active{display:block}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filter-bar label{color:var(--muted);font-size:11px;display:flex;align-items:center;gap:4px;cursor:pointer}
.filter-bar input[type=checkbox]{width:14px;height:14px;cursor:pointer}

/* TABLES */
.tbl-wrap{border:1px solid var(--border);border-radius:4px;overflow:hidden}
.tbl-header{display:grid;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0}
.tbl-header .th{padding:6px 8px;color:var(--muted);font-size:11px;cursor:pointer;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-header .th:hover{color:var(--text)}
.tbl-header .th.sort-asc::after{content:' ▲'}
.tbl-header .th.sort-desc::after{content:' ▼'}
.vscroll-viewport{overflow-y:auto;position:relative}
.vscroll-inner{position:relative}
.vrow{display:grid;border-bottom:1px solid #1c2128;cursor:pointer;position:absolute;width:100%;left:0}
.vrow:hover{background:var(--row-hov)}
.vrow.selected{background:var(--blue-hi)}
.vrow.highlighted{background:#2d2a1c}
.td{padding:5px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.td.mono{font-family:'Consolas','Courier New',monospace}
.td.dim{color:var(--muted)}
.td.green{color:var(--green)}
.td.amber{color:var(--amber)}
.td.red{color:var(--red)}
.td.accent{color:var(--accent)}
.td.link{color:var(--accent);cursor:pointer}
.td.link:hover{text-decoration:underline}

/* EXPAND DETAIL */
.expand-row{background:var(--expand);border-left:3px solid var(--accent);border-bottom:1px solid var(--border);padding:10px 16px;font-size:12px}
.expand-row .kv-grid{display:grid;grid-template-columns:180px 1fr;gap:4px 12px;margin-bottom:8px}
.expand-row .kv-grid .k{color:var(--muted)}
.expand-row .kv-grid .v{word-break:break-all}
.expand-row h4{color:var(--muted);font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.expand-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.expand-tbl th{color:var(--muted);padding:3px 8px;text-align:left;border-bottom:1px solid var(--border)}
.expand-tbl td{padding:3px 8px;border-bottom:1px solid #1c2128;word-break:break-all}
.expand-tbl tr:hover td{background:var(--row-hov)}

/* FLEET */
#fleet-table .tbl-header{grid-template-columns:36px 180px 200px 60px 50px 110px 80px 100px 100px 80px 60px 120px 80px}
#fleet-table .vrow{grid-template-columns:36px 180px 200px 60px 50px 110px 80px 100px 100px 80px 60px 120px 80px}

/* MANIFEST PANEL */
#manifest-panel .mp-wrap{border:1px solid var(--border);border-radius:4px;overflow:hidden}
#manifest-panel .mp-title{padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
#manifest-panel .mp-title span{color:var(--accent)}
#manifest-panel .mp-body{padding:10px 16px;font-size:12px}
#manifest-panel .mp-grid{display:grid;grid-template-columns:220px 1fr;gap:4px 12px}
#manifest-panel .mp-grid .k{color:var(--muted)}
#manifest-panel .mp-grid .v{word-break:break-all}
#manifest-panel .mp-errors{margin-top:8px}
#manifest-panel .mp-err-item{padding:3px 8px;background:#2d1f1f;border:1px solid var(--red);border-radius:3px;margin-bottom:4px;font-size:11px;color:var(--red)}

/* REMOTE IP SUMMARY */
#ip-summary{margin-top:12px;border:1px solid var(--border);border-radius:4px;overflow:hidden}
#ip-summary h3{padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
#ip-summary-tbl{width:100%;border-collapse:collapse;font-size:12px}
#ip-summary-tbl th{color:var(--muted);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface)}
#ip-summary-tbl td{padding:4px 8px;border-bottom:1px solid #1c2128}
#ip-summary-tbl tr:hover td{background:var(--row-hov)}
#ip-summary-tbl .ip-in-dns{color:var(--green)}

/* DNS CORR SUMMARY */
#dns-corr-summary{margin-bottom:10px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--muted)}
#dns-corr-summary span{color:var(--accent)}

/* BANNERS */
.banner{padding:6px 12px;border-radius:4px;margin-bottom:10px;font-size:12px}
.banner.warn{background:#2d2a1c;border:1px solid var(--amber);color:var(--amber)}
.banner.info{background:#1a2332;border:1px solid var(--accent);color:var(--accent)}

/* PROGRESS */
#progress-overlay{display:none;position:fixed;inset:0;background:rgba(13,17,23,.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#progress-overlay.show{display:flex}
#progress-bar-wrap{width:320px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
#progress-bar{height:100%;background:var(--accent);width:0%;transition:width .15s}
#progress-label{color:var(--text);font-size:13px}

/* GLOBAL SEARCH RESULTS */
#gsearch-panel{display:none;position:fixed;top:48px;right:16px;width:520px;max-height:60vh;background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow-y:auto;z-index:150;box-shadow:0 8px 24px rgba(0,0,0,.6)}
#gsearch-panel.show{display:block}
#gsearch-panel .gs-section{padding:6px 12px 2px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-top:1px solid var(--border)}
#gsearch-panel .gs-section:first-child{border-top:none}
#gsearch-panel .gs-row{padding:5px 12px;cursor:pointer;border-bottom:1px solid #1c2128;font-size:12px}
#gsearch-panel .gs-row:hover{background:var(--row-hov)}
#gsearch-panel .gs-row .gs-main{color:var(--text)}
#gsearch-panel .gs-row .gs-sub{color:var(--muted);font-size:11px}
#gsearch-panel .gs-empty{padding:12px;color:var(--muted);text-align:center}

/* DROP ZONE */
#drop-zone{display:none;position:fixed;inset:0;background:rgba(88,166,255,.08);border:3px dashed var(--accent);z-index:300;align-items:center;justify-content:center;font-size:18px;color:var(--accent)}
#drop-zone.show{display:flex}

/* SINGLE-HOST NOTICE */
.solo-notice{padding:16px;color:var(--muted);font-size:12px;text-align:center}
/* PLACEHOLDER */
#placeholder{display:none;position:fixed;inset:0;background:var(--bg);z-index:50;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#placeholder.show{display:flex}
#placeholder h2{color:var(--muted);font-size:16px}
#placeholder p{color:var(--muted);font-size:13px}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* EXECUTION DIALOG */
#exec-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400}
#exec-modal-backdrop.show{display:block}
#exec-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:401;background:var(--surface);border:1px solid var(--border);border-radius:6px;width:600px;max-width:96vw;box-shadow:0 16px 48px rgba(0,0,0,.7)}
#exec-modal.show{display:block}
#exec-modal .em-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);border-radius:6px 6px 0 0}
#exec-modal .em-title{color:var(--accent);font-size:13px;font-weight:bold}
#exec-modal .em-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
#exec-modal .em-close:hover{color:var(--text)}
#exec-modal .em-body{padding:14px 16px}
#exec-modal .em-field{display:grid;grid-template-columns:130px 1fr;align-items:center;gap:6px;margin-bottom:10px}
#exec-modal .em-field label{color:var(--muted);font-size:12px;text-align:right;padding-right:8px}
#exec-modal .em-field input,#exec-modal .em-field select{width:100%}
#exec-modal .em-actions{display:flex;gap:8px;justify-content:flex-end;padding:10px 16px;border-top:1px solid var(--border)}
#exec-modal .em-btn-copy{background:var(--accent);border-color:var(--accent);color:#0d1117}
#exec-modal .em-btn-copy:hover{opacity:.85}
#exec-modal .em-cmd{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:'Consolas','Courier New',monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;user-select:all;cursor:text;color:var(--green);margin-bottom:10px}
#exec-modal .em-cmd-note{color:var(--muted);font-size:11px;margin-bottom:6px}
.fleet-exec-btn{font-size:11px;padding:2px 7px;color:var(--accent);border-color:var(--accent)}
.fleet-exec-btn:hover{background:var(--accent);color:#0d1117}
.net-collect-btn{font-size:11px;padding:3px 9px;margin-right:6px}

/* BULK SELECTION — EXECUTE TAB */
.exec-cb-col{width:32px;text-align:center;padding:4px 6px!important}
.exec-type-col{width:52px;text-align:center;padding:4px 6px!important}
.exec-host-tbl tr.exec-sel-row>td{border-left:3px solid var(--accent)}
.exec-host-tbl tr:not(.exec-sel-row)>td:first-child{border-left:3px solid transparent}
.exec-th-toggle{cursor:pointer;user-select:none}
.exec-th-toggle:hover{color:var(--text)}
.exec-bulk-bar{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:0 2px}
.exec-bulk-left{display:flex;align-items:center;gap:10px}
.exec-sel-counter{font-size:12px;color:var(--muted)}
.exec-add-queue-btn{background:var(--accent);border-color:var(--accent);color:#0d1117;font-size:12px;padding:4px 12px}
.exec-add-queue-btn:disabled{opacity:.35;cursor:not-allowed}

/* QUEUE PREVIEW MODAL */
#queue-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400}
#queue-modal-backdrop.show{display:block}
#queue-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:401;background:var(--surface);border:1px solid var(--border);border-radius:6px;width:700px;max-width:96vw;max-height:90vh;overflow:hidden;display:none;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.7)}
#queue-modal.show{display:flex}
#queue-modal .qm-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);border-radius:6px 6px 0 0;flex-shrink:0}
#queue-modal .qm-title{color:var(--accent);font-size:13px;font-weight:bold}
#queue-modal .qm-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
#queue-modal .qm-close:hover{color:var(--text)}
#queue-modal .qm-body{padding:14px 16px;overflow-y:auto;flex:1;min-height:0}
#queue-modal .qm-job-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;margin-bottom:14px}
#queue-modal .qm-job-tbl{width:100%;border-collapse:collapse;font-size:12px}
#queue-modal .qm-job-tbl th{text-align:left;padding:4px 10px;color:var(--muted);font-weight:normal;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0}
#queue-modal .qm-job-tbl td{padding:4px 10px;border-bottom:1px solid var(--border)}
#queue-modal .qm-job-tbl tr:last-child td{border-bottom:none}
#queue-modal .qm-field{display:grid;grid-template-columns:150px 1fr;align-items:center;gap:6px;margin-bottom:10px}
#queue-modal .qm-field label{color:var(--muted);font-size:12px;text-align:right;padding-right:8px}
#queue-modal .qm-field input,#queue-modal .qm-field select{width:100%}
#queue-modal .qm-section-title{font-size:11px;color:var(--muted);font-weight:bold;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px 0;border-bottom:1px solid var(--border);padding-bottom:4px}
#queue-modal .qm-actions{display:flex;gap:8px;justify-content:flex-end;padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0}
#queue-modal .qm-btn-launch{background:var(--accent);border-color:var(--accent);color:#0d1117}
#queue-modal .qm-btn-launch:hover{opacity:.85}
#queue-modal .qm-success{background:rgba(63,185,80,.1);border:1px solid var(--green);border-radius:4px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--green)}
#queue-modal .qm-settings-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
#queue-modal .qm-settings-tbl th{text-align:left;padding:4px 6px;color:var(--muted);font-weight:normal;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;font-size:11px}
#queue-modal .qm-settings-tbl td{padding:3px 4px;border-bottom:1px solid var(--border)}
#queue-modal .qm-settings-tbl input,#queue-modal .qm-settings-tbl select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:3px 5px;font-size:11px;box-sizing:border-box}
#queue-modal .qm-settings-tbl input:focus,#queue-modal .qm-settings-tbl select:focus{border-color:var(--accent);outline:none}
#queue-modal .qm-settings-tbl td.qm-cell-host,#queue-modal .qm-settings-tbl td.qm-cell-type{font-size:12px;white-space:nowrap;padding:3px 6px}
#queue-modal .qm-settings-wrap{max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:4px}

/* COLUMN RESIZE */
.tbl-header .th{position:relative;user-select:none}
.tbl-header .th:last-child{overflow:visible}
.resizer{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;z-index:10;border-right:2px solid var(--border);transition:border-color .15s ease,background .15s ease}
.resizer:hover{border-right:2px solid var(--accent);background:rgba(88,166,255,0.15)}
.resizer.resizing{border-right:2px solid var(--accent);background:rgba(88,166,255,0.3)}
.tbl-header .th:last-child .resizer{right:0}

/* ROW HIGHLIGHT (cross-reference navigation) */
@keyframes rowPulse{0%{background:rgba(88,166,255,0.35)}50%{background:rgba(88,166,255,0.6)}100%{background:rgba(88,166,255,0.35)}}
.row-highlight{background:rgba(88,166,255,0.35)!important;border-left:4px solid var(--accent)!important;outline:1px solid var(--accent);box-shadow:inset 0 0 0 1px var(--accent);animation:rowPulse 0.6s ease 2}
.row-highlight.fade{background:transparent!important;border-left:4px solid transparent!important;outline:none;box-shadow:none;transition:all 1.5s ease}

</style>
</head>

<body>
<div id="drop-zone">Drop JSON files here</div>
<div id="placeholder" class="show">
  <h2>QuickAiR &mdash; DFIR Volatile Analyzer</h2>
  <p>Loading file picker&hellip;</p>
</div>

<div id="progress-overlay">
  <div id="progress-label">Loading&hellip;</div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>

<div id="gsearch-panel"></div>

<div id="topbar">
  <h1>QuickAiR</h1>
  <span class="sep">|</span>
  <button id="loadBtn" onclick="triggerLoad()">&#128193; Load JSON</button>
  <input type="file" id="fileInput" multiple accept=".json" style="display:none" onchange="handleFiles(this.files)">
  <div id="hostSelectorWrap" class="host-selector-wrap">
    <div id="hostSelectorCurrent" class="host-selector-current" onclick="toggleHostDropdown(event)">-- No files loaded --</div>
    <div id="hostSelectorDropdown" class="host-dropdown" style="display:none"></div>
  </div>
  <input type="text" id="globalSearch" placeholder="Global search&hellip;" oninput="onGlobalSearch(this.value)" onkeydown="if(event.key==='Escape'){closeGSearch()}">

  <span class="badge">Procs <span id="b-procs">0</span></span>
  <span class="badge">Active <span id="b-active">0</span></span>
  <span class="badge">Remote IPs <span id="b-ips">0</span></span>
  <span class="badge">DNS Matches <span id="b-dns">0</span></span>
  <span class="sep">|</span>
  <span id="collectionMeta"></span>
</div>

<div id="tabbar">
  <button class="tab-btn active" onclick="switchTab('fleet')"    id="tab-fleet">FLEET</button>
  <button class="tab-btn"        onclick="switchTab('processes')" id="tab-processes">PROCESSES</button>
  <button class="tab-btn"        onclick="switchTab('network')"   id="tab-network">NETWORK</button>
  <button class="tab-btn"        onclick="switchTab('dns')"       id="tab-dns">DNS</button>
  <button class="tab-btn"        onclick="switchTab('dlls')"      id="tab-dlls"  style="display:none">DLLs</button>
  <button class="tab-btn"        onclick="switchTab('users')"     id="tab-users" style="display:none">USERS</button>
  <button class="tab-btn"        onclick="switchTab('execute')"   id="tab-execute">EXECUTE</button>
</div>

<div id="panel-fleet"     class="tab-panel active"></div>
<div id="panel-processes" class="tab-panel"></div>
<div id="panel-network"   class="tab-panel"></div>
<div id="panel-dns"       class="tab-panel"></div>
<div id="panel-dlls"      class="tab-panel"></div>
<div id="panel-users"     class="tab-panel"></div>
<div id="panel-execute"   class="tab-panel"></div>

// ── SORT STATE ────────────────────────────────────────────────────────────────
const sortState = { tab: null, column: null, dir: 'none' };

function sortTable(tab, colKey, numeric) {
  if (sortState.tab === tab && sortState.column === colKey) {
    if (sortState.dir === 'none') sortState.dir = 'asc';
    else if (sortState.dir === 'asc') sortState.dir = 'desc';
    else sortState.dir = 'none';
  } else {
    sortState.tab = tab; sortState.column = colKey; sortState.dir = 'asc';
  }
  // Update arrow indicators
  document.querySelectorAll('.sort-arrow').forEach(el => {
    el.classList.remove('asc','desc');
    el.textContent = '⇅';
  });
  const arrowEl = document.getElementById('sort-' + tab + '-' + colKey);
  if (arrowEl) {
    if (sortState.dir === 'asc')  { arrowEl.textContent = '↑'; arrowEl.classList.add('asc'); }
    if (sortState.dir === 'desc') { arrowEl.textContent = '↓'; arrowEl.classList.add('desc'); }
  }
  // Re-render the tab
  switch(tab) {
    case 'processes': applyProcFilters(); break;
    case 'network':   applyNetFilters();  break;
    case 'dns':       applyDnsFilters();  break;
    case 'dlls':      applyDllFilters();  break;
    case 'fleet':     renderFleet();      break;
    case 'users':     usersApplyFilters(); break;
  }
}

function makeSortHeader(label, tab, colKey, numeric) {
  return `<th class="sortable-th" onclick="sortTable('${tab}','${colKey}',${numeric?'true':'false'})">` +
    `${esc(label)} <span class="sort-arrow" id="sort-${tab}-${colKey}">⇅</span></th>`;
}

function applySortToRows(rows, colKey, numeric) {
  if (!sortState.dir || sortState.dir === 'none') return rows;
  const dir = sortState.dir === 'asc' ? 1 : -1;
  return rows.slice().sort((a, b) => {
    const av = a[colKey]; const bv = b[colKey];
    if (numeric) {
      const an = parseFloat(av ?? -1);
      const bn = parseFloat(bv ?? -1);
      return (an - bn) * dir;
    }
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    return String(av).localeCompare(String(bv)) * dir;
  });
}

// ── RESIZABLE COLUMNS ─────────────────────────────────────────────────────────
// colWidths[tabName] = [w0, w1, ...] in pixels — source of truth for grid-template-columns
const colWidths = {};

// VS container IDs per tabName
const VS_IDS  = { processes:'proc-vs', network:'net-vs', dns:'dns-vs', dlls:'dlls-vs', fleet:'fleet-vs', users:'users-vs' };
const HDR_IDS = { processes:'proc-header', network:'net-header', dns:'dns-header', dlls:'dlls-header', fleet:'fleet-header', users:'users-header' };

// Apply current colWidths[tabName] as grid-template-columns to header + all visible vrows
function _applyGridTemplate(tabName) {
  const widths = colWidths[tabName];
  if (!widths || !widths.length) return;
  const template = widths.map(function(w) { return w + 'px'; }).join(' ');
  const hdr = document.getElementById(HDR_IDS[tabName]);
  if (hdr) hdr.style.gridTemplateColumns = template;
  const vsEl = document.getElementById(VS_IDS[tabName]);
  if (vsEl) vsEl.querySelectorAll('.vrow').forEach(function(row) {
    row.style.gridTemplateColumns = template;
  });
}

function addResizeHandles(headerId, tabName) {
  const header = document.getElementById(headerId);
  if (!header) return;
  const ths = header.querySelectorAll('.th');
  if (!ths.length) return;

  // Initialize pixel widths: sessionStorage first, then offsetWidth
  const widths = Array.from(ths).map(function(th, i) {
    const saved = sessionStorage.getItem('colWidth_' + tabName + '_' + i);
    return saved ? parseInt(saved, 10) : th.offsetWidth;
  });
  colWidths[tabName] = widths;

  // Apply initial grid template (converts any 1fr to measured px)
  _applyGridTemplate(tabName);

  ths.forEach(function(th, colIndex) {
    // Remove existing handle to avoid duplicates on re-render
    var existing = th.querySelector('.resizer');
    if (existing) existing.remove();
    var handle = document.createElement('div');
    handle.className = 'resizer';
    th.appendChild(handle);

    handle.addEventListener('mousedown', function(e) {
      e.preventDefault();
      e.stopPropagation();
      handle.classList.add('resizing');
      var startX = e.clientX;
      var startW = widths[colIndex];

      function onMove(ev) {
        var newW = Math.max(40, startW + (ev.clientX - startX));
        widths[colIndex] = newW;
        sessionStorage.setItem('colWidth_' + tabName + '_' + colIndex, newW);
        _applyGridTemplate(tabName);
      }
      function onUp() {
        handle.classList.remove('resizing');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Always stop click from bubbling to th — prevents sort on handle click
    handle.addEventListener('click', function(e) {
      e.stopPropagation();
    });
  });
}

// no-op: addResizeHandles now handles restoration from sessionStorage
function restoreColWidths(tabName, headerId) {}

// Re-apply grid-template-columns to all vrows after virtual scroll render
function reapplyColWidthsFromStorage(tabName, vsEl) {
  if (!tabName || !vsEl) return;
  var widths = colWidths[tabName];
  if (!widths || !widths.length) return;
  var template = widths.map(function(w) { return w + 'px'; }).join(' ');
  vsEl.querySelectorAll('.vrow').forEach(function(row) {
    row.style.gridTemplateColumns = template;
  });
}

// ── CROSS-HOST USER INDEX ─────────────────────────────────────────────────────
function buildUserIndex(allHosts) {
  const idx = {};

  allHosts.forEach(host => {
    const u = host.Users;
    if (!u) return;
    const hostname = host.manifest ? host.manifest.hostname : '?';

    // Index users by SID
    if (u.users) {
      u.users.forEach(user => {
        const key = user.SID;
        if (!key) return;
        if (!idx[key]) {
          idx[key] = {
            SID:         user.SID,
            Username:    user.Username,
            Domain:      user.Domain,
            AccountType: user.AccountType,
            SIDMetadata: user.SIDMetadata,
            domainInfo:  null,
            machines:    []
          };
        }
        idx[key].machines.push({
          hostname:         hostname,
          FirstLogon:       user.FirstLogon,
          LastLogon:        user.LastLogonUTC,
          LastLogonSource:  user.LastLogonSource,
          ProfilePath:      user.ProfilePath,
          IsLoaded:         user.IsLoaded,
          HasLocalAccount:  user.HasLocalAccount,
          LocalDisabled:    user.LocalDisabled,
          GroupMemberships: user.GroupMemberships || []
        });
      });
    }

    // Enrich with DC domain_accounts by SID — create entry if not yet seen
    if (u.domain_accounts) {
      u.domain_accounts.forEach(da => {
        const key = da.SID;
        if (!key) return;
        if (!idx[key]) {
          idx[key] = {
            SID:         da.SID,
            Username:    da.SamAccountName || da.DisplayName || '?',
            Domain:      u.domain_name || '',
            AccountType: 'Domain',
            SIDMetadata: { WellKnown: false, Description: '' },
            domainInfo:  null,
            machines:    []
          };
        }
        idx[key].domainInfo = {
          dcHost:              hostname,
          WhenCreated:         da.WhenCreatedUTC,
          LastLogonAD:         da.LastLogonUTC,
          LastLogonTimestampAD:da.LastLogonTimestampUTC,
          PasswordLastSet:     da.PasswordLastSetUTC,
          Enabled:         da.Enabled,
          LockedOut:       da.LockedOut,
          BadLogonCount:   da.BadLogonCount,
          MemberOf:        da.MemberOf || [],
          Source:          da.Source
        };
        if (da.SamAccountName) idx[key].Username = da.SamAccountName;
      });
    }
  });

  return idx;
}

function handleFiles(files) {
  if (!files || !files.length) return;
  const fileArr = Array.from(files);
  showProgress('Loading 0 / ' + fileArr.length, 0);
  let done = 0;
  fileArr.forEach(f => {
    loadJsonFile(f, () => {
      done++;
      setProgress(done / fileArr.length * 100);
      setProgressLabel('Loading ' + done + ' / ' + fileArr.length);
      // Update UI after EACH file so hosts appear as they load
      const ph = document.getElementById('placeholder');
      if (Object.keys(state.hosts).length > 0) ph.classList.remove('show');
      rebuildHostSelector();
      updateBadges();
      updateMeta();
      updateTabVisibility();
      rebuildUserIndex();
      renderActiveTab();
      if (done === fileArr.length) hideProgress();
    });
  });
}

function loadJsonFile(file, onDone) {
  if (file.size > 10 * 1024 * 1024) {
    console.warn('Large file: ' + file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB)');
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      // Handle execution result JSONs (from Executor.ps1)
      if (data.ExecutionId && data.ComputerName && !data.manifest) {
        state.executions[data.ComputerName] = data;
        onDone(); return;
      }
      const host = (data.manifest && data.manifest.hostname) ? data.manifest.hostname : file.name.replace(/\.json$/i,'');
      // Normalize new JSON keys (v2.0) with backwards compat for old format
      data.processes   = data.Processes   || data.processes   || [];
      data.network_tcp = (data.Network && data.Network.tcp) || data.network_tcp || [];
      data.dns_cache   = (data.Network && data.Network.dns) || data.dns_cache   || [];
      data.network_udp = (data.Network && data.Network.udp) || data.network_udp || [];
      data.network_adapters = (data.manifest && data.manifest.network_adapters) || [];
      // Build DLL count per process (CAPABILITY: DLL Count column)
      const hasDlls = Array.isArray(data.DLLs) && data.DLLs.length > 0;
      const dllCountMap = {};
      if (hasDlls) {
        data.DLLs.forEach(dll => {
          dllCountMap[dll.ProcessId] = (dllCountMap[dll.ProcessId] || 0) + 1;
        });
      }
      data.processes.forEach(p => {
        p.DLLCount = hasDlls ? parseInt(dllCountMap[p.ProcessId] || 0, 10) : null;
      });
      // Duplicate detection by hostname — skip if already loaded
      if (state.hosts[host]) { onDone(); return; }
      state.hosts[host] = data;
      if (!state.activeHost) state.activeHost = host;
    } catch(ex) {
      console.error('Parse error in ' + file.name + ': ' + ex.message);
    }
    onDone();
  };
  reader.onerror = () => { console.error('Read error: ' + file.name); onDone(); };
  reader.readAsText(file);
}

function refreshAll() {

    ph.classList.remove('show');
  }
  rebuildHostSelector();
  updateBadges();

function updateTabVisibility() {
  const d = activeData();
  const dllsBtn = el('tab-dlls');
  if (dllsBtn) {
    dllsBtn.style.display = (d && d.DLLs && d.DLLs.length > 0) ? '' : 'none';
  }
  const usersBtn = el('tab-users');
  if (usersBtn) {
    const hasUsers = Object.values(state.hosts).some(h => h.Users);
    usersBtn.style.display = hasUsers ? '' : 'none';
  }
}

function removeHost(hostname) {
  if (!state.hosts[hostname]) return;
  const wasActive = (state.activeHost === hostname);
  delete state.hosts[hostname];
  const remaining = Object.keys(state.hosts);
  rebuildUserIndex();
  rebuildHostSelector();
  updateBadges();
  updateMeta();
  updateTabVisibility();
  const dd = el('hostSelectorDropdown');
  if (dd) dd.style.display = 'none';
  if (remaining.length === 0) {
    state.activeHost = null;
    const ph = document.getElementById('placeholder');
    if (ph) ph.classList.add('show');
    renderActiveTab();
  } else if (wasActive) {
    switchHost(remaining[0]);
  } else {
    renderActiveTab();
  }
}

function rebuildHostSelector() {
  const curr = el('hostSelectorCurrent');
  const dd   = el('hostSelectorDropdown');
  if (!curr || !dd) return;
  const hosts = Object.keys(state.hosts);
  if (hosts.length === 0) {
    curr.textContent = '-- No files loaded --';
    dd.innerHTML = '';
    return;
  }
  curr.textContent = state.activeHost || hosts[0];
  dd.innerHTML = hosts.map(h => `
    <div class="host-dropdown-item${h === state.activeHost ? ' active' : ''}">
      <span class="host-name" onclick="selectHostFromDropdown('${esc(h)}')">${esc(h)}</span>
      <button class="host-rm-btn" onclick="hostDropdownStartRemove(event,'${esc(h)}')" title="Remove host">×</button>
    </div>`).join('');
}

function toggleHostDropdown(e) {
  if (e) e.stopPropagation();
  const dd = el('hostSelectorDropdown');
  if (!dd) return;
  dd.style.display = dd.style.display === 'none' ? '' : 'none';
}

function selectHostFromDropdown(hostname) {
  const dd = el('hostSelectorDropdown');
  if (dd) dd.style.display = 'none';
  switchHost(hostname);
}

function hostDropdownStartRemove(e, hostname) {
  e.stopPropagation();
  const item = e.target.closest('.host-dropdown-item');
  if (!item) { removeHost(hostname); return; }
  if (item._removeTimer) clearTimeout(item._removeTimer);
  item.innerHTML = `<span class="host-name">${esc(hostname)}</span>
    <button class="host-rm-confirm" onclick="hostDropdownConfirmRemove(event,'${esc(hostname)}')">Confirm ×</button>
    <button class="host-rm-cancel" onclick="hostDropdownCancelRemove(event,'${esc(hostname)}')">Cancel</button>`;
  item._removeTimer = setTimeout(() => {
    if (item.isConnected) rebuildHostSelector();
  }, 3000);
}

function hostDropdownConfirmRemove(e, hostname) {
  e.stopPropagation();
  const item = e.target.closest('.host-dropdown-item');
  if (item && item._removeTimer) clearTimeout(item._removeTimer);
  removeHost(hostname);
}

function hostDropdownCancelRemove(e, hostname) {
  e.stopPropagation();
  const item = e.target.closest('.host-dropdown-item');
  if (item && item._removeTimer) clearTimeout(item._removeTimer);
  rebuildHostSelector();
}

function switchHost(h) {
  if (!h || !state.hosts[h]) return;
  state.activeHost = h;
  state.expandedRows = {};
  // Reset users view state on every host switch (userIndex is global — do NOT rebuild)
  usersView   = 'peruser';
  usersSearch = '';
  rebuildHostSelector();
  updateBadges();
  updateMeta();
  updateTabVisibility();
  renderActiveTab();
}

function activeData() { return state.activeHost ? state.hosts[state.activeHost] : null; }

function updateBadges() {
  const d = activeData();
  if (!d) { ['b-procs','b-active','b-ips','b-dns'].forEach(id => el(id).textContent = '0'); return; }
  el('b-procs').textContent  = d.processes ? d.processes.length : 0;
  const allConns = (d.network_tcp || []).concat(d.network_udp || []);
  const active = allConns.filter(c => c.State === 'ESTABLISHED').length;
  el('b-active').textContent = active;
  const ips = new Set(allConns.filter(c => c.RemoteAddress && c.RemoteAddress !== '0.0.0.0' && c.RemoteAddress !== '::').map(c => c.RemoteAddress));
  el('b-ips').textContent   = ips.size;
  const matches = allConns.filter(c => c.DnsMatch).length;
  el('b-dns').textContent   = matches;
  if (typeof updateExecuteBadge === 'function') updateExecuteBadge();
}

function updateMeta() {
  const d = activeData();
  if (!d || !d.manifest) { el('collectionMeta').textContent = ''; return; }
  const m = d.manifest;
  el('collectionMeta').textContent =
    (m.collection_time_utc || '') + '  |  ' +
    (m.target_os_caption || m.target_os_version || '') + '  |  ' +
    'PS ' + (m.target_ps_version || '?') + '  |  ' +
    (m.Network_source ? (m.Network_source.network || '') : (m.network_source || '')) + '/' + (m.Network_source ? (m.Network_source.dns || '') : (m.dns_source || ''));
}

let activeTab = 'fleet';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el('tab-' + tab).classList.add('active');
  el('panel-' + tab).classList.add('active');
  renderActiveTab();
}

function renderActiveTab() {
  switch(activeTab) {
    case 'fleet':     renderFleet();     break;
    case 'processes': renderProcesses(); break;
    case 'network':   renderNetwork();   break;
    case 'dns':       renderDns();       break;
    case 'dlls':      renderDlls();      break;
    case 'users':     renderUsers();     break;
    case 'execute':   renderExecute();   break;
  }
}

// ── VIRTUAL SCROLL ENGINE ─────────────────────────────────────────────────────
const ROW_H    = 28;
const BUFFER   = 20;
const MAX_ROWS = 60;

function createVS(containerId, columns, data, rowRenderer, onRowClick, tabName) {
  const wrap = el(containerId);
  if (!wrap) return null;
  wrap.innerHTML = '';

  const viewport = document.createElement('div');
  viewport.className = 'vscroll-viewport';
  viewport.style.maxHeight = '480px';
  const inner = document.createElement('div');
  inner.className = 'vscroll-inner';
  inner.style.height = (data.length * ROW_H) + 'px';
  viewport.appendChild(inner);
  wrap.appendChild(viewport);

  // Expansion state — tracks which row is expanded and its pixel height
  let expandIdx    = -1;
  let expandHeight = 0;

  function totalHeight()  { return data.length * ROW_H + expandHeight; }
  function getRowTop(i)   { return i * ROW_H + (expandIdx >= 0 && i > expandIdx ? expandHeight : 0); }

  let lastStart = -1;
  function render() {
    const scrollTop = viewport.scrollTop;
    const visH      = viewport.clientHeight;
    const start     = Math.max(0, Math.floor(scrollTop / ROW_H) - BUFFER);
    const end       = Math.min(data.length, Math.ceil((scrollTop + visH) / ROW_H) + BUFFER);
    if (start === lastStart && inner.querySelectorAll('.vrow').length > 0) return;
    lastStart = start;

    // Remove vrow nodes outside range; preserve .expand-row
    Array.from(inner.children).forEach(n => {
      if (!n.classList.contains('vrow')) return;
      const idx = parseInt(n.dataset.idx);
      if (idx < start || idx >= end) n.remove();
    });

    // Update tops of remaining rows (expansion shifts rows below expandIdx)
    inner.querySelectorAll('.vrow').forEach(n => {
      n.style.top = getRowTop(parseInt(n.dataset.idx)) + 'px';
    });

    // Reposition expand-row if present
    const expEl = inner.querySelector('.expand-row');
    if (expEl && expandIdx >= 0) {
      expEl.style.top = (getRowTop(expandIdx) + ROW_H) + 'px';
    }

    // Add missing nodes
    const existing = new Set(Array.from(inner.querySelectorAll('.vrow')).map(n => parseInt(n.dataset.idx)));
    for (let i = start; i < end && (i - start) < MAX_ROWS; i++) {
      if (existing.has(i)) continue;
      const row = document.createElement('div');
      row.className = 'vrow';
      row.dataset.idx = i;
      row.style.top = getRowTop(i) + 'px';
      row.style.gridTemplateColumns = columns;
      row.innerHTML = rowRenderer(data[i], i);
      row.addEventListener('click', ev => {
        if (ev.target.classList.contains('link')) return;
        onRowClick(i, data[i], row);
      });
      inner.appendChild(row);
    }
    // BUG 3: re-apply saved column widths after every render so scroll doesn't lose widths
    if (tabName) reapplyColWidthsFromStorage(tabName, inner);
  }

  viewport.addEventListener('scroll', render);
  setTimeout(render, 0);

  return {
    viewport, inner, render,
    scrollToIndex(idx) {
      viewport.scrollTop = Math.max(0, idx * ROW_H - viewport.clientHeight / 2);
      setTimeout(render, 50);
    },
    // FIX 1: update closure variable `data`, not just this.data
    update(newData) {
      data = newData;
      expandIdx = -1; expandHeight = 0;
      inner.style.height = totalHeight() + 'px';
      inner.innerHTML = '';
      lastStart = -1;
      render();
    },
    // FIX 2: insert expand panel below row idx, push subsequent rows down
    expand(idx, contentEl) {
      const old = inner.querySelector('.expand-row');
      if (old) old.remove();
      expandIdx    = idx;
      expandHeight = 0;
      contentEl.classList.add('expand-row');
      contentEl.style.cssText = 'position:absolute;left:0;width:100%;top:' + (getRowTop(idx) + ROW_H) + 'px';
      inner.appendChild(contentEl);
      // Measure actual rendered height then re-layout
      requestAnimationFrame(() => {
        expandHeight = contentEl.offsetHeight || 200;
        inner.style.height = totalHeight() + 'px';
        lastStart = -1;
        render();
      });
    },
    collapse() {
      const old = inner.querySelector('.expand-row');
      if (old) old.remove();
      expandIdx = -1; expandHeight = 0;
      inner.style.height = totalHeight() + 'px';
      lastStart = -1;
      render();
    }
  };
}

// ── GLOBAL SEARCH ─────────────────────────────────────────────────────────────
function onGlobalSearch(q) {
  const panel = el('gsearch-panel');
  if (!q || q.length < 2) { panel.classList.remove('show'); panel.innerHTML = ''; return; }
  const d = activeData();
  if (!d) { panel.classList.remove('show'); return; }
  const lq = q.toLowerCase();

  const pMatches = (d.processes || []).filter(p =>
    str(p.Name).includes(lq) || str(p.ProcessId).includes(lq) ||
    str(p.ExecutablePath).includes(lq) || str(p.CommandLine).includes(lq)
  ).slice(0, 20);

  const nMatches = (d.network_tcp || []).filter(c =>
    str(c.RemoteAddress).includes(lq) || str(c.RemotePort).includes(lq) ||
    str(c.LocalAddress).includes(lq)  || str(c.LocalPort).includes(lq) ||
    str(c.State).includes(lq)         || str(c.DnsMatch).includes(lq) ||
    str(c.ReverseDns).includes(lq)    || str(c.InterfaceAlias).includes(lq)
  ).slice(0, 20);

  const dMatches = (d.dns_cache || []).filter(e =>
    str(e.Entry).includes(lq) || str(e.Data).includes(lq)
  ).slice(0, 20);

  if (!pMatches.length && !nMatches.length && !dMatches.length) {
    panel.innerHTML = '<div class="gs-empty">No results</div>';
    panel.classList.add('show');
    return;
  }

  let html = '';
  if (pMatches.length) {
    html += '<div class="gs-section">Processes (' + pMatches.length + ')</div>';
    pMatches.forEach((p, i) => {
      html += `<div class="gs-row" onclick="gotoProcess(${p.ProcessId})">
        <div class="gs-main">${esc(p.Name)} [PID ${p.ProcessId}]</div>
        <div class="gs-sub">${esc(p.ExecutablePath || p.CommandLine || '')}</div>
      </div>`;
    });
  }
  if (nMatches.length) {
    html += '<div class="gs-section">Network (' + nMatches.length + ')</div>';
    nMatches.forEach(c => {
      const pname = getProcName(c.OwningProcess, d);
      html += `<div class="gs-row" onclick="gotoNetwork('${esc(c.RemoteAddress)}')">
        <div class="gs-main">${esc(c.RemoteAddress)}:${c.RemotePort} ← ${esc(pname)}</div>
        <div class="gs-sub">${esc(c.State)} ${esc(c.DnsMatch || c.ReverseDns || '')}</div>
      </div>`;
    });
  }
  if (dMatches.length) {
    html += '<div class="gs-section">DNS (' + dMatches.length + ')</div>';
    dMatches.forEach(e => {
      html += `<div class="gs-row" onclick="switchTab('dns')">
        <div class="gs-main">${esc(e.Entry)}</div>
        <div class="gs-sub">${esc(e.Data || '')}</div>
      </div>`;
    });
  }

  panel.innerHTML = html;
  panel.classList.add('show');
}

function closeGSearch() {
  el('gsearch-panel').classList.remove('show');
  el('globalSearch').value = '';
}

document.addEventListener('click', e => {
  const gs = el('gsearch-panel');
  if (gs && !gs.contains(e.target) && e.target.id !== 'globalSearch') {
    gs.classList.remove('show');
  }
  const hwrap = el('hostSelectorWrap');
  const hdd   = el('hostSelectorDropdown');
  if (hdd && hwrap && !hwrap.contains(e.target)) hdd.style.display = 'none';
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function str(v) { return v == null ? '' : String(v).toLowerCase(); }
function trunc(s, n) { s = String(s||''); return s.length > n ? s.slice(0,n-1)+'…' : s; }
function fmtUTC(s) {
  if (!s) return '<span style="color:var(--muted)">&#8212;</span>';
  try {
    const d = new Date(s);
    if (isNaN(d)) return '<span style="color:var(--muted)">&#8212;</span>';
    const pad = n => String(n).padStart(2, '0');
    return esc(d.getUTCFullYear() + '-' +
      pad(d.getUTCMonth() + 1) + '-' +
      pad(d.getUTCDate()) + ' ' +
      pad(d.getUTCHours()) + ':' +
      pad(d.getUTCMinutes()) + ':' +
      pad(d.getUTCSeconds()) + ' UTC');
  } catch(e) { return '<span style="color:var(--muted)">&#8212;</span>'; }
}

// Returns ordered list of adapter InterfaceAlias values from active host manifest
function getAdapterAliases() {
  const d = activeData();
  if (!d || !d.manifest || !d.manifest.network_adapters) return [];
  return d.manifest.network_adapters.map(a => a.InterfaceAlias || a.AdapterName || '').filter(Boolean);
}

// Returns a CSS color string for a given InterfaceAlias value
function ifaceColor(alias, adapterAliases) {
  if (!alias) return 'var(--muted)';
  if (alias === 'ALL_INTERFACES') return 'var(--amber)';
  if (alias === 'LOOPBACK')       return 'var(--muted)';
  if (alias === 'UNKNOWN')        return 'var(--red)';
  const idx = (adapterAliases || []).indexOf(alias);
  if (idx === 0) return 'var(--accent)';
  if (idx === 1) return 'var(--green)';
  return 'var(--text)';
}
function getProcName(pid, data) {
  if (!data || !data.processes) return String(pid);
  const p = data.processes.find(p => p.ProcessId == pid);
  return p ? p.Name : String(pid);
}
function gotoProcess(pid) {
  closeGSearch();
  switchTab('processes');
  setTimeout(() => highlightProcessPid(pid), 100);
}
function gotoNetwork(ip) {
  closeGSearch();
  switchTab('network');
  setTimeout(() => highlightNetworkIp(ip), 100);
}

// ── NAVIGATION WITH ROW HIGHLIGHT ─────────────────────────────────────────────
function navigateToRow(tab, matchField, matchValue) {
  switchTab(tab);
  setTimeout(function() {
    const tabMap = {
      processes: { data: procData, vsKey: 'proc' },
      network:   { data: netData,  vsKey: 'net'  },
      dns:       { data: dnsData,  vsKey: 'dns'  },
      dlls:      { data: dllData,  vsKey: 'dlls' },
    };
    const entry = tabMap[tab];
    if (!entry) return;
    const idx = entry.data.findIndex(function(r) { return String(r[matchField]) === String(matchValue); });
    const vs = state.vsInstances[entry.vsKey];
    if (!vs) return;
    if (idx >= 0) {
      vs.viewport.scrollTop = Math.max(0, idx * ROW_H - vs.viewport.clientHeight / 2);
      setTimeout(function() {
        vs.render();
        setTimeout(function() {
          const inner = vs.viewport.querySelector('.vscroll-inner');
          if (!inner) return;
          const rowEl = inner.querySelector('[data-idx="' + idx + '"]');
          if (!rowEl) return;
          // Clear any existing highlight
          inner.querySelectorAll('.row-highlight').forEach(function(el) {
            el.classList.remove('row-highlight', 'fade');
          });
          // FIX 3: brighter pulse, 3s hold then 1.5s fade
          rowEl.classList.add('row-highlight');
          setTimeout(function() { rowEl.classList.add('fade'); }, 3000);
          setTimeout(function() { rowEl.classList.remove('row-highlight', 'fade'); }, 4500);
        }, 50);
      }, 50);
    }
  }, 100);
}

// ── FLEET TAB ─────────────────────────────────────────────────────────────────
let fleetSort = { col: 'hostname', dir: 1 };

const _fleetRemoveTimers = {};

function fleetStartRemove(e, hostname) {
  e.stopPropagation();
  const cell = e.currentTarget;
  if (_fleetRemoveTimers[hostname]) clearTimeout(_fleetRemoveTimers[hostname]);
  cell.innerHTML = `<button class="fleet-rm-confirm" onclick="fleetConfirmRemove(event,'${esc(hostname)}')">Confirm ×</button> <button class="fleet-rm-cancel" onclick="fleetCancelRemove(event,'${esc(hostname)}')">Cancel</button>`;
  _fleetRemoveTimers[hostname] = setTimeout(() => {
    if (cell.isConnected) cell.innerHTML = '×';
    delete _fleetRemoveTimers[hostname];
  }, 3000);
}

function fleetConfirmRemove(e, hostname) {
  e.stopPropagation();
  if (_fleetRemoveTimers[hostname]) { clearTimeout(_fleetRemoveTimers[hostname]); delete _fleetRemoveTimers[hostname]; }
  removeHost(hostname);
}

function fleetCancelRemove(e, hostname) {
  e.stopPropagation();
  if (_fleetRemoveTimers[hostname]) { clearTimeout(_fleetRemoveTimers[hostname]); delete _fleetRemoveTimers[hostname]; }
  const cell = e.target.closest('.fleet-rm-cell');
  if (cell) cell.innerHTML = '×';
}

function renderFleet() {
  const panel = el('panel-fleet');
  const hosts = Object.keys(state.hosts);

  if (hosts.length === 0) {
    panel.innerHTML = '<div class="solo-notice">No files loaded. Click <strong>Load JSON</strong> to begin.</div>';
    return;
  }
  if (hosts.length === 1) {
    const h0 = hosts[0];
    const m  = state.hosts[h0].manifest || {};
    const allErrs = m.collection_errors || [];
    const realErrors = allErrs.filter(e => !e || e.severity !== 'warning');
    const warnings   = allErrs.filter(e => e && e.severity === 'warning');
    const tipLines = allErrs.map(e => {
      const prefix = (e && e.severity === 'warning') ? '[warn] ' : '[error] ';
      return prefix + (e && e.artifact ? e.artifact + ': ' : '') + (e && e.message ? e.message : '');
    }).join('&#10;');
    const tipAttr = tipLines ? ` title="${esc(tipLines)}" style="cursor:help"` : '';
    const errBadge = realErrors.length > 0
      ? ` <span style="color:var(--amber)"${tipAttr}>${realErrors.length} errors</span>`
      : warnings.length > 0
        ? ` <span style="color:var(--green)"${tipAttr}>${warnings.length} warnings</span>`
        : ' <span style="color:var(--green)">0 errors</span>';
    panel.innerHTML = `<div class="solo-notice">
      Single host loaded: <strong>${esc(h0)}</strong> &nbsp;|&nbsp;
      ${esc(m.target_os_caption||'')} &nbsp;|&nbsp; PS ${esc(m.target_ps_version||'?')} &nbsp;|&nbsp;
      ${esc(m.collection_time_utc||'')} &nbsp;|&nbsp;${errBadge}
      <br><br>Switch to <a onclick="switchTab('processes')">PROCESSES</a>, <a onclick="switchTab('network')">NETWORK</a>, or <a onclick="switchTab('dns')">DNS</a> to investigate.
    </div>
    <div id="manifest-panel"></div>`;
    renderManifestPanel(h0);
    return;
  }

  const COLS = '36px 180px 200px 60px 50px 110px 80px 100px 100px 80px 60px 120px';
  const headers = [
    { key:'_remove',            label:''                 },
    { key:'hostname',           label:'Hostname'         },
    { key:'target_os_caption',  label:'OS'               },
    { key:'target_ps_version',  label:'PS'               },
    { key:'nic_count',          label:'NICs'             },
    { key:'network_source',     label:'Net Method'       },
    { key:'proc_count',         label:'Processes'        },
    { key:'active_count',       label:'Active Conns'     },
    { key:'unique_ips',         label:'Remote IPs'       },
    { key:'dns_count',          label:'DNS'              },
    { key:'errors_count',       label:'Errors'           },
    { key:'collection_time_utc',label:'Collected (UTC)'  },
  ];

  function buildRows() {
    const rows = hosts.map(h => {
      const d  = state.hosts[h];
      const m  = d.manifest || {};
      const allConns = (d.network_tcp||[]).concat(d.network_udp||[]);
      const ac = allConns.filter(c=>c.State==='ESTABLISHED').length;
      const ips = new Set(allConns.filter(c=>c.RemoteAddress&&c.RemoteAddress!=='0.0.0.0'&&c.RemoteAddress!=='::').map(c=>c.RemoteAddress));
      const collection_errors = m.collection_errors || [];
      const adapters = m.network_adapters || [];
      return {
        hostname:            h,
        target_os_caption:   m.target_os_caption  || '',
        target_ps_version:   m.target_ps_version  || '',
        nic_count:           adapters.length,
        _adapter_names:      adapters.map(a => a.InterfaceAlias || a.AdapterName || '').filter(Boolean),
        network_source:      m.Network_source ? (m.Network_source.network || JSON.stringify(m.Network_source)) : (m.network_source || ''),
        proc_count:          (d.processes||[]).length,
        active_count:        ac,
        unique_ips:          ips.size,
        dns_count:           (d.dns_cache||[]).length,
        errors_count:        collection_errors.filter(e => !e || e.severity !== 'warning').length,
        collection_time_utc: m.collection_time_utc || '',
      };
    });
    if (sortState.tab === 'fleet' && sortState.column && sortState.dir !== 'none') {
      const numericFleetCols = new Set(['nic_count','proc_count','active_count','unique_ips','dns_count','errors_count']);
      rows = applySortToRows(rows, sortState.column, numericFleetCols.has(sortState.column));
    } else {
      rows.sort((a,b) => {
        const av = a[fleetSort.col]; const bv = b[fleetSort.col];
        if (typeof av === 'number') return (av - bv) * fleetSort.dir;
        return String(av).localeCompare(String(bv)) * fleetSort.dir;
      });
    }
    return rows;
  }

  function headerHTML() {
    return headers.map(h => {
      if (h.key === '_remove') return '<div class="th" style="padding:0"></div>';
      const numeric = /count$|_count$|ps_version$/.test(h.key);
      const arrow = (sortState.tab === 'fleet' && sortState.column === h.key)
        ? (sortState.dir === 'asc' ? '↑' : sortState.dir === 'desc' ? '↓' : '⇅') : '⇅';
      const arrowCls = (sortState.tab === 'fleet' && sortState.column === h.key && sortState.dir !== 'none')
        ? ' class="sort-arrow ' + sortState.dir + '"' : ' class="sort-arrow"';
      return `<div class="th sortable-th" onclick="sortTable('fleet','${h.key}',${numeric})">${esc(h.label)} <span id="sort-fleet-${h.key}"${arrowCls}>${arrow}</span></div>`;
    }).join('');
  }

  panel.innerHTML = `
    <div id="fleet-table" class="tbl-wrap">
      <div class="tbl-header" style="grid-template-columns:${COLS}" id="fleet-header"></div>
      <div id="fleet-vs"></div>
    </div>
    <div id="fleet-exec-banners" style="margin-top:8px"></div>
    <div id="manifest-panel" style="margin-top:12px"></div>`;

  el('fleet-header').innerHTML = headerHTML();
  setTimeout(() => addResizeHandles('fleet-header', 'fleet'), 0);

  const rows = buildRows();
  state.vsInstances['fleet'] = createVS('fleet-vs', COLS, rows,
    (row) => {
      const nicTip = row._adapter_names.length ? row._adapter_names.join('\n') : '';
      const nicColor = row.nic_count >= 2 ? 'accent' : 'dim';
      return `
      <div class="td fleet-rm-cell" onclick="fleetStartRemove(event,'${esc(row.hostname)}')">×</div>
      <div class="td">${esc(row.hostname)}</div>
      <div class="td dim">${esc(row.target_os_caption||'')}</div>
      <div class="td">${esc(row.target_ps_version)}</div>
      <div class="td ${nicColor}" title="${esc(nicTip)}">${row.nic_count || ''}</div>
      <div class="td dim">${esc(row.network_source)}</div>
      <div class="td">${row.proc_count}</div>
      <div class="td green">${row.active_count}</div>
      <div class="td">${row.unique_ips}</div>
      <div class="td">${row.dns_count}</div>
      <div class="td ${row.errors_count > 0 ? 'amber' : 'dim'}">${row.errors_count}</div>
      <div class="td dim">${esc(row.collection_time_utc)}</div>`;
    },
    (i, row) => {
      switchHost(row.hostname);
      renderManifestPanel(row.hostname);
    },
    'fleet'
  );
  if (typeof renderFleetExecBanners === 'function') renderFleetExecBanners();
}

function renderManifestPanel(hostname) {
  const mp = el('manifest-panel');
  if (!mp) return;
  const d = state.hosts[hostname];
  if (!d) { mp.innerHTML = ''; return; }
  const m = d.manifest || {};
  const collection_errors = m.collection_errors || [];
  const errHTML = collection_errors.length === 0
    ? '<span style="color:var(--green)">None</span>'
    : collection_errors.map(e => {
        const sev = (e.severity === 'warning') ? '<span style="color:var(--amber)">[warn]</span>' : '<span style="color:var(--red)">[error]</span>';
        return `<div class="mp-err-item">${sev} [${esc(e.artifact||'?')}] ${esc(e.message||'')}</div>`;
      }).join('');

  const adapters = m.network_adapters || [];
  let adapterTableHTML = '';
  if (adapters.length > 0) {
    const rows = adapters.map((a, i) => {
      const ips  = Array.isArray(a.IPAddresses) ? a.IPAddresses.join(', ') : (a.IPAddresses || '');
      const dns  = Array.isArray(a.DNSServers)  ? a.DNSServers.join(', ')  : (a.DNSServers  || '');
      return `<tr>
        <td><strong>${esc(a.InterfaceAlias || a.AdapterName || '')}</strong></td>
        <td class="mono">${esc(ips)}</td>
        <td class="mono">${esc(a.MACAddress || '')}</td>
        <td>${esc(a.DefaultGateway || '')}</td>
        <td>${esc(dns)}</td>
        <td>${a.DHCPEnabled ? 'Yes' : 'No'}</td>
      </tr>`;
    }).join('');
    adapterTableHTML = `<div class="mp-wrap" style="margin-top:8px">
      <div class="mp-title"><span>Network Adapters (${adapters.length})</span></div>
      <div class="mp-body" style="padding:8px 16px">
        <table class="expand-tbl" style="width:100%">
          <tr><th>Adapter Name</th><th>IP Addresses</th><th>MAC</th><th>Gateway</th><th>DNS Servers</th><th>DHCP</th></tr>
          ${rows}
        </table>
      </div>
    </div>`;
  }

  mp.innerHTML = `<div class="mp-wrap">
    <div class="mp-title">
      <span>Manifest &mdash; ${esc(hostname)}</span>

let procFilters = { search: '' };
let procSort    = { col: 'ProcessId', dir: 1 };
let procData    = [];

function renderSignedIcon(sig) {
  if (!sig) return '<span style="color:var(--muted)">?</span>';
  if (sig.IsSigned === true  && sig.IsValid === true)  return '<span style="color:var(--green)">&#10003;</span>';
  if (sig.IsSigned === true  && sig.IsValid === false)  return '<span style="color:var(--red)">&#10007;</span>';
  if (sig.IsSigned === false) return '<span style="color:var(--muted)">&mdash;</span>';
  return '<span style="color:var(--amber)">?</span>';
}

function integrityRank(level) {
  if (!level) return 0;
  switch (level) {
    case 'System':           return 7;
    case 'ProtectedProcess': return 6;
    case 'High':             return 5;
    case 'MediumPlus':       return 4;
    case 'Medium':           return 3;
    case 'Low':              return 2;
    case 'Untrusted':        return 1;
    default:                 return 0;
  }
}

function renderIntegrityBadge(level) {
  if (!level) return '<span style="color:var(--muted)">&mdash;</span>';
  switch (level) {
    case 'System':
    case 'High':
      return '<span style="color:var(--red)">' + esc(level) + '</span>';
    case 'Low':
    case 'Untrusted':
    case 'MediumPlus':
      return '<span style="color:var(--amber)">' + esc(level) + '</span>';
    default:
      return '<span>' + esc(level) + '</span>';
  }
}

function renderProcesses() {

const PROC_COLS = '60px 60px 120px 160px 300px 1fr 80px 55px 40px 120px 130px 120px 80px';

function buildProcHeader(COLS) {
  const headers = [
    { key:'ProcessId',       label:'PID'    },
    { key:'ParentProcessId', label:'PPID'   },
    { key:'_parentName',     label:'Parent' },
    { key:'Name',            label:'Name'   },
    { key:'ExecutablePath',  label:'Path'   },
    { key:'CommandLine',     label:'CmdLine'},
    { key:'_connCount',      label:'Conns'  },
    { key:'DLLCount',        label:'DLLs'   },
    { key:'_signed',         label:'Sig'    },
    { key:'_signerCompany',  label:'Signer' },
    { key:'_sha256Short',    label:'SHA256' },
    { key:'Owner',           label:'Owner'  },
    { key:'IntegrityLevel',  label:'Integrity' },
  ];
  const h = el('proc-header');
  if (!h) return;
  restoreColWidths('processes', 'proc-header');
  h.innerHTML = headers.map(hd => {
    const numeric = /Id$|PID$|PPID$|Count$|Session$|Handle$|^IntegrityLevel$/.test(hd.key);
    const arrow = (sortState.tab === 'processes' && sortState.column === hd.key)
      ? (sortState.dir === 'asc' ? '↑' : sortState.dir === 'desc' ? '↓' : '⇅') : '⇅';
    const arrowCls = (sortState.tab === 'processes' && sortState.column === hd.key && sortState.dir !== 'none')
      ? ' class="sort-arrow ' + sortState.dir + '"' : ' class="sort-arrow"';
    return `<div class="th sortable-th" onclick="sortTable('processes','${hd.key}',${numeric})">${esc(hd.label)} <span id="sort-processes-${hd.key}"${arrowCls}>${arrow}</span></div>`;
  }).join('');
  setTimeout(() => addResizeHandles('proc-header', 'processes'), 0);
}

function applyProcFilters() {
  const d = activeData(); if (!d) return;
  const lq = procFilters.search.toLowerCase();

  // Build connection count map (TCP + UDP)
  const connMap = {};
  (d.network_tcp||[]).concat(d.network_udp||[]).forEach(c => {
    if (c.OwningProcess) connMap[c.OwningProcess] = (connMap[c.OwningProcess]||0)+1;
  });

  // Build PID -> name map
  const nameMap = {};
  (d.processes||[]).forEach(p => nameMap[p.ProcessId] = p.Name);

  let rows = (d.processes||[]).map(p => {
    const sig = p.Signature || null;
    const sha256Short = p.SHA256 ? (p.SHA256.slice(0,16)+'...') : (p.SHA256Error ? p.SHA256Error : '');
    return Object.assign({}, p, {
      _connCount:     connMap[p.ProcessId] || 0,
      _parentName:    nameMap[p.ParentProcessId] || '',
      _signed:        sig ? sig.IsSigned : null,
      _signerCompany: sig ? (sig.SignerCompany || '') : '',
      _sha256Short:   sha256Short,
      _intRank:       integrityRank(p.IntegrityLevel),
    });
  });

  if (lq) rows = rows.filter(p =>
    str(p.Name).toLowerCase().includes(lq) || str(p.ProcessId).includes(lq) ||
    str(p.ExecutablePath).toLowerCase().includes(lq) || str(p.CommandLine).toLowerCase().includes(lq) ||
    str(p.Owner).toLowerCase().includes(lq)
  );
  // Apply sortTable if active for this tab
  const numericProcCols = new Set(['ProcessId','ParentProcessId','_connCount','DLLCount','SessionId','HandleCount','_intRank']);
  if (sortState.tab === 'processes' && sortState.column && sortState.dir !== 'none') {
    let sortCol = sortState.column;
    if (sortCol === 'IntegrityLevel') sortCol = '_intRank';
    rows = applySortToRows(rows, sortCol, numericProcCols.has(sortCol));
  } else {
    rows.sort((a,b) => {
      const av = a[procSort.col]; const bv = b[procSort.col];
      if (typeof av === 'number') return (av - bv) * procSort.dir;
      return String(av||'').localeCompare(String(bv||'')) * procSort.dir;
    });
  }
  procData = rows;
  state.filtered['processes'] = rows;

  const cnt = el('proc-count');
  if (cnt) cnt.textContent = rows.length + ' processes';

  state.expandedRows['proc'] = null;

  if (state.vsInstances['proc']) {
    state.vsInstances['proc'].update(rows);
  } else {
    state.vsInstances['proc'] = createVS('proc-vs', PROC_COLS, rows, renderProcRow, onProcRowClick, 'processes');
  }
}

function onProcRowClick(i, p, rowEl) {

    state.expandedRows['proc'] = null;
    if (vs) vs.collapse();

  }
  state.expandedRows['proc'] = i;

  const d = activeData();
  const connMap = {};
  const tcpSet = new Set(d.network_tcp||[]);
  (d.network_tcp||[]).concat(d.network_udp||[]).forEach(c => {
    if (c.OwningProcess == p.ProcessId) {
      const key = (c.RemoteAddress||'')+ ':' + (c.RemotePort||'') + ':' + (c.LocalPort||'');
      if (!connMap[key]) connMap[key] = Object.assign({ _proto: tcpSet.has(c) ? 'TCP' : 'UDP' }, c);
    }
  });
  const myConns = Object.values(connMap);
  const children = (d.processes||[]).filter(c => c.ParentProcessId == p.ProcessId);

  let connsHTML = '';
  if (myConns.length) {
    const adAliases = getAdapterAliases();
    connsHTML = `<h4>Network Connections (${myConns.length})</h4>
    <table class="expand-tbl"><tr>
      <th>Proto</th><th>Remote IP</th><th>Port</th><th>State</th><th>DNS Match</th><th>Reverse DNS</th><th>Interface</th><th>Private</th>
    </tr>` +
    myConns.map(c => {

      return `<tr>
      <td>${c._proto}</td>
      <td class="mono"><a onclick="gotoNetworkIp('${esc(c.RemoteAddress||'')}')">${esc(c.RemoteAddress||'—')}</a></td>
      <td>${c.RemotePort!=null?c.RemotePort:'—'}</td><td>${esc(c.State||'—')}</td>
      <td>${esc(c.DnsMatch||'')}</td><td>${esc(c.ReverseDns||'')}</td>
      <td><span style="color:${iCol};font-weight:bold">${esc(ia)}</span></td>
      <td>${c.IsPrivateIP?'yes':''}</td></tr>`;
    }).join('') + '</table>';
  }

  let childHTML = '';

      children.map(c => `<a onclick="gotoProcessPid(${c.ProcessId})">${esc(c.Name)} [${c.ProcessId}]</a>`).join('  ');
  }

  const dllCountHTML = p.DLLCount != null
    ? `<span class="detail-value"><a onclick="event.stopPropagation();gotoProcessDlls(${p.ProcessId})">${p.DLLCount} modules</a></span>`
    : `<span class="detail-value">—</span>`;

  const expand = document.createElement('div');
  expand.innerHTML = `
    <div class="kv-grid">
      <span class="k">CommandLine</span>   <span class="v">${esc(p.CommandLine||'—')}</span>
      <span class="k">ExecutablePath</span> <span class="v">${esc(p.ExecutablePath||'—')}</span>
      <span class="k">CreationDateUTC</span><span class="v">${esc(p.CreationDateUTC||'')}</span>
      <span class="k">WorkingSetSize</span> <span class="v">${fmtBytes(p.WorkingSetSize)}</span>
      <span class="k">VirtualSize</span>    <span class="v">${fmtBytes(p.VirtualSize)}</span>
      <span class="k">SessionId</span>      <span class="v">${p.SessionId}</span>
      <span class="k">HandleCount</span>    <span class="v">${p.HandleCount}</span>
      <span class="k">Owner</span>          <span class="v">${esc(p.Owner||'—')}</span>
      <span class="k">IntegrityLevel</span> <span class="v">${esc(p.IntegrityLevel||'—')}</span>
      ${!p.IntegrityLevel && p.IntegrityLevelError ? '<span class="k">IntegrityError</span><span class="v" style="color:var(--amber)">' + esc(p.IntegrityLevelError) + '</span>' : ''}
      <span class="k">Loaded DLLs</span>   ${dllCountHTML}
      ${p.SHA256 ? `<span class="k">SHA256</span><span class="v mono">${esc(p.SHA256)}</span>` : ''}
      ${!p.SHA256 && p.SHA256Error ? `<span class="k">SHA256Error</span><span class="v" style="color:var(--amber)">${esc(p.SHA256Error)}</span>` : ''}
      ${p.Signature ? `<span class="k">Sig Status</span>   <span class="v${/^PS2_/.test(p.Signature.Status||'')?' style="color:var(--amber)"':''}">${esc(p.Signature.Status||'—')}${/^PS2_/.test(p.Signature.Status||'')?' (unvalidated)':''}</span>
      <span class="k">IsOSBinary</span>   <span class="v" style="color:${p.Signature.IsOSBinary===true?'var(--green)':p.Signature.IsOSBinary===false?'var(--red)':'var(--muted)'}">${p.Signature.IsOSBinary===true?'Yes':p.Signature.IsOSBinary===false?'No':'—'}</span>
      <span class="k">SignatureType</span><span class="v">${esc(p.Signature.SignatureType||'—')}</span>
      <span class="k">SignerSubject</span> <span class="v">${esc(p.Signature.SignerSubject||'—')}</span>

function gotoNetworkIp(ip)   { switchTab('network'); setTimeout(() => highlightNetworkIp(ip), 100); }
function gotoProcessDlls(pid) {
  switchTab('dlls');
  setTimeout(() => {
    dllFilters.search = String(pid);
    const inp = el('dlls-search');
    if (inp) inp.value = String(pid);
    applyDllFilters();
  }, 100);
}

function fmtBytes(b) {
  if (!b) return '0 B';
  b = parseInt(b);
  if (b > 1073741824) return (b/1073741824).toFixed(1)+' GB';
  if (b > 1048576)    return (b/1048576).toFixed(1)+' MB';
  if (b > 1024)       return (b/1024).toFixed(0)+' KB';
  return b+' B';
}

let netFilters = { search: '', state: '', iface: '', proto: '' };

/** Merge TCP and UDP into a single array with _proto tag */
function mergeNetConns(d) {
  const tcp = (d.network_tcp || []).map(c => Object.assign({}, c, { _proto: 'TCP' }));
  const udp = (d.network_udp || []).map(c => Object.assign({}, c, {
    _proto: 'UDP',
    RemoteAddress: c.RemoteAddress || null,
    RemotePort:    c.RemotePort    || null,
    State:         c.State         || null,
    CreationTime:  c.CreationTime  || null,
    DnsMatch:      c.DnsMatch      || null,
    ReverseDns:    c.ReverseDns    || null,
    IsPrivateIP:   c.IsPrivateIP != null ? c.IsPrivateIP : null,
    InterfaceAlias:c.InterfaceAlias|| null,
  }));
  return tcp.concat(udp);
}

function renderNetwork() {
  const panel = el('panel-network');
  const d     = activeData();
  if (!d) { panel.innerHTML = '<div class="solo-notice">No file loaded.</div>'; return; }

  const allConns = mergeNetConns(d);

  // Build dropdown options from merged data
  const states = [...new Set(allConns.map(c=>c.State).filter(Boolean))].sort();
  const ifaces = [...new Set(allConns.map(c=>c.InterfaceAlias).filter(Boolean))].sort();

  const stateOpts = `<option value="">All States</option>` + states.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  const ifaceOpts = `<option value="">All Interfaces</option>` + ifaces.map(i=>`<option value="${esc(i)}">${esc(i)}</option>`).join('');
  const protoOpts = `<option value="">All Protocols</option><option value="TCP">TCP</option><option value="UDP">UDP</option>`;

}

function applyNetFilters() {
  const d = activeData(); if (!d) return;
  const lq = netFilters.search.toLowerCase();

  // Build pid->name map for fallback
  const nameMap = {};
  (d.processes||[]).forEach(p => nameMap[p.ProcessId] = p.Name);

  // I-1: Merge TCP + UDP
  let rows = mergeNetConns(d).map(c => Object.assign({}, c, {
    // I-4: Use collector ProcessName, fall back to process-list join
    _procName: c.OwningProcessName || nameMap[c.OwningProcess] || String(c.OwningProcess)
  }));

  // Text search
  if (lq) rows = rows.filter(c =>
    str(c.RemoteAddress).includes(lq) || str(c.RemotePort).includes(lq) ||
    str(c.LocalAddress).includes(lq)  || str(c.LocalPort).includes(lq) ||
    str(c.State).includes(lq)         || str(c.DnsMatch).includes(lq) ||
    str(c.ReverseDns).includes(lq)    || str(c.InterfaceAlias).includes(lq) ||
    str(c._procName).includes(lq)     || str(c.OwningProcess).includes(lq) ||
    str(c._proto).includes(lq)        || str(c.CreationTime).includes(lq)
  );

  // Dropdown filters
  if (netFilters.proto) rows = rows.filter(c => c._proto === netFilters.proto);
  if (netFilters.state) rows = rows.filter(c => c.State === netFilters.state);
  if (netFilters.iface) rows = rows.filter(c => c.InterfaceAlias === netFilters.iface);

  // M-4: Default sort — ESTABLISHED first, then newest CreationTime
  if (sortState.tab === 'network' && sortState.column && sortState.dir !== 'none') {
    const numericNetCols = new Set(['OwningProcess','LocalPort','RemotePort']);
    rows = applySortToRows(rows, sortState.column, numericNetCols.has(sortState.column));
  } else {
    rows.sort((a,b) => {
      // ESTABLISHED first
      const aEst = a.State === 'ESTABLISHED' ? 0 : 1;
      const bEst = b.State === 'ESTABLISHED' ? 0 : 1;
      if (aEst !== bEst) return aEst - bEst;
      // Then newest CreationTime (descending)
      const aT = a.CreationTime || '';
      const bT = b.CreationTime || '';
      if (aT !== bT) return bT > aT ? 1 : bT < aT ? -1 : 0;
      return 0;
    });
  }
  netData = rows;

  // Count label: "N connections (T tcp, U udp)"
  const tcpCount = rows.filter(c => c._proto === 'TCP').length;
  const udpCount = rows.filter(c => c._proto === 'UDP').length;
  const cnt = el('net-count');
  if (cnt) cnt.textContent = rows.length + ' connections (' + tcpCount + ' tcp, ' + udpCount + ' udp)';

  const COLS = '48px 130px 55px 130px 55px 130px 55px 100px 150px 150px 150px 120px 50px';
  state.expandedRows['net'] = null;

  if (state.vsInstances['net']) {
    state.vsInstances['net'].update(rows);
  } else {
    state.vsInstances['net'] = createVS('net-vs', COLS, rows, renderNetRow, onNetRowClick, 'network');
  }

  buildIpSummary(d, rows);
}

function renderNetRow(c, i) {
  const stCls     = c.State==='ESTABLISHED'?'green': c.State==='LISTEN'?'accent':'dim';
  const ifAlias   = c.InterfaceAlias || '';
  const ifColor   = ifaceColor(ifAlias, getAdapterAliases());
  const protoCls  = c._proto === 'UDP' ? 'amber' : 'dim';
  return `
    <div class="td ${protoCls}" style="font-size:10px;font-weight:bold">${c._proto}</div>
    <div class="td link" onclick="event.stopPropagation();gotoProcessPid(${c.OwningProcess})">${esc(c._procName)}</div>
    <div class="td dim">${c.OwningProcess}</div>
    <div class="td mono dim">${esc(c.LocalAddress)}</div>
    <div class="td dim">${c.LocalPort}</div>
    <div class="td mono">${esc(c.RemoteAddress||'—')}</div>
    <div class="td">${c.RemotePort != null ? c.RemotePort : '—'}</div>
    <div class="td ${c.State ? stCls : 'dim'}">${esc(c.State||'—')}</div>
    <div class="td dim">${c.CreationTime ? fmtUTC(c.CreationTime) : '—'}</div>
    <div class="td accent">${esc(c.DnsMatch||'')}</div>
    <div class="td dim">${esc(c.ReverseDns||'')}</div>
    <div class="td"><span style="color:${ifColor};font-weight:bold">${esc(ifAlias)}</span></div>
    <div class="td dim">${c.IsPrivateIP?'yes':''}</div>`;
}

function onNetRowClick(i, c, rowEl) {
  const vs   = state.vsInstances['net'];
  const prev = state.expandedRows['net'];
  if (prev === i) {
    state.expandedRows['net'] = null;
    if (vs) vs.collapse();
    return;
  }
  state.expandedRows['net'] = i;

  const d = activeData();
  const proc = (d.processes||[]).find(p => p.ProcessId == c.OwningProcess);
  // M-2: Use already-merged netData instead of re-merging
  const sameProc = netData.filter(x => x.OwningProcess == c.OwningProcess).slice(0,20);
  const sameIP   = c.RemoteAddress && c.RemoteAddress !== '0.0.0.0'
    ? netData.filter(x => x.RemoteAddress === c.RemoteAddress && x.OwningProcess !== c.OwningProcess).slice(0,20)
    : [];

  const sameProcHTML = sameProc.length > 1 ? `
    <h4 style="margin-top:8px">All connections from this process (${sameProc.length})</h4>
    <table class="expand-tbl"><tr><th>Proto</th><th>Remote</th><th>Port</th><th>State</th><th>DNS</th></tr>` +
    sameProc.map(x=>`<tr><td>${x._proto||'TCP'}</td><td class="mono">${esc(x.RemoteAddress||'—')}</td><td>${x.RemotePort!=null?x.RemotePort:'—'}</td><td>${esc(x.State||'—')}</td><td>${esc(x.DnsMatch||'')}</td></tr>`).join('') +
    '</table>' : '';

  const sameIPHTML = sameIP.length ? `
    <h4 style="margin-top:8px">Other connections to ${esc(c.RemoteAddress)} (${sameIP.length})</h4>
    <table class="expand-tbl"><tr><th>Proto</th><th>Process</th><th>PID</th><th>L.Port</th><th>State</th></tr>` +
    sameIP.map(x=>`<tr><td>${x._proto||'TCP'}</td><td>${esc(getProcName(x.OwningProcess,d))}</td><td>${x.OwningProcess}</td><td>${x.LocalPort}</td><td>${esc(x.State||'—')}</td></tr>`).join('') +
    '</table>' : '';

  const expand = document.createElement('div');
  expand.innerHTML = `
    <div class="kv-grid">
      <span class="k">Protocol</span>      <span class="v">${c._proto}</span>
      <span class="k">Process</span>       <span class="v"><a onclick="gotoProcessPid(${c.OwningProcess})">${esc(c._procName)} [${c.OwningProcess}]</a></span>
      <span class="k">Executable</span>    <span class="v">${esc(proc ? (proc.ExecutablePath||'—') : '—')}</span>
      <span class="k">CommandLine</span>   <span class="v">${esc(proc ? (proc.CommandLine||'—') : '—')}</span>
      <span class="k">Local</span>         <span class="v">${esc(c.LocalAddress)}:${c.LocalPort}</span>
      <span class="k">Remote</span>        <span class="v">${c.RemoteAddress ? esc(c.RemoteAddress)+':'+(c.RemotePort!=null?c.RemotePort:'—') : '—'}</span>
      <span class="k">State</span>         <span class="v">${esc(c.State||'—')}</span>
      <span class="k">Created (UTC)</span> <span class="v">${c.CreationTime ? fmtUTC(c.CreationTime) : '—'}</span>
      <span class="k">Interface</span>     <span class="v">${esc(c.InterfaceAlias||'')}</span>
      <span class="k">DNS Match</span>     <span class="v">${esc(c.DnsMatch||'—')}</span>
      <span class="k">Reverse DNS</span>   <span class="v">${esc(c.ReverseDns||'—')}</span>
      <span class="k">Private IP</span>    <span class="v">${c.IsPrivateIP?'Yes':'No'}</span>
    </div>
    ${sameProcHTML}${sameIPHTML}`;

  if (vs) vs.expand(i, expand);
}

function buildIpSummary(d, filteredConns) {
  const tbody = el('ip-summary-body');
  if (!tbody) return;

  const dnsIPs = new Set((d.dns_cache||[]).map(e=>e.Data).filter(Boolean));
  const ipMap  = {};
  // I-6: includes both TCP and UDP (filteredConns is already merged)
  filteredConns.forEach(c => {
    if (!c.RemoteAddress || c.RemoteAddress==='0.0.0.0' || c.RemoteAddress==='::') return;
    if (!ipMap[c.RemoteAddress]) {
      ipMap[c.RemoteAddress] = { ip: c.RemoteAddress, revDns: c.ReverseDns||'', dnsMatch: c.DnsMatch||'', count:0, procs:new Set() };
    }
    ipMap[c.RemoteAddress].count++;
    ipMap[c.RemoteAddress].procs.add(getProcName(c.OwningProcess,d));
    if (!ipMap[c.RemoteAddress].revDns && c.ReverseDns)  ipMap[c.RemoteAddress].revDns  = c.ReverseDns;
    if (!ipMap[c.RemoteAddress].dnsMatch && c.DnsMatch)  ipMap[c.RemoteAddress].dnsMatch = c.DnsMatch;
  });

  const sorted = Object.values(ipMap).sort((a,b)=>b.count-a.count).slice(0,100);
  tbody.innerHTML = sorted.map(r => {
    const inDns = dnsIPs.has(r.ip);
    return `<tr>
      <td class="mono ${inDns?'ip-in-dns':''}">${esc(r.ip)}</td>
      <td>${esc(r.revDns)}</td>
      <td>${esc(r.dnsMatch)}</td>
      <td>${r.count}</td>
      <td>${esc([...r.procs].slice(0,5).join(', '))}</td>
    </tr>`;
  }).join('');
}

// I-5: Collapsible Adapters sub-panel
function buildAdapterPanel(d) {
  const wrap = el('adapter-panel');
  if (!wrap) return;
  const adapters = d.network_adapters || [];
  if (!adapters.length) { wrap.innerHTML = ''; return; }

  const cards = adapters.map(a => {

    const dns = Array.isArray(a.DNSServers)  ? a.DNSServers.join(', ')  : (a.DNSServers  || '');
    const alias = a.InterfaceAlias || a.AdapterName || '';
    const ifColor = ifaceColor(alias, getAdapterAliases());
    return `<div style="display:inline-block;vertical-align:top;width:280px;margin:6px 8px 6px 0;padding:8px 12px;background:var(--row-bg);border-radius:6px;border:1px solid var(--border)">
      <div style="font-weight:bold;margin-bottom:4px;color:${ifColor}">${esc(alias)}</div>
      <div class="kv-grid" style="font-size:11px">
        <span class="k">IP</span><span class="v mono">${esc(ips)}</span>
        <span class="k">MAC</span><span class="v mono">${esc(a.MACAddress || '')}</span>
        <span class="k">Gateway</span><span class="v">${esc(a.DefaultGateway || '')}</span>
        <span class="k">DNS</span><span class="v">${esc(dns)}</span>
        <span class="k">DHCP</span><span class="v">${a.DHCPEnabled ? 'Yes' : 'No'}</span>
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div style="margin-top:12px">
      <h3 style="cursor:pointer;user-select:none" onclick="var b=this.nextElementSibling;b.style.display=b.style.display==='none'?'':'none';this.querySelector('span').textContent=b.style.display==='none'?'&#9654;':'&#9660;'">
        <span>&#9660;</span> Network Adapters (${adapters.length})
      </h3>
      <div>${cards}</div>

}

function netSortBy(col) {
  if (netSort.col === col) netSort.dir *= -1; else { netSort.col = col; netSort.dir = 1; }
  const COLS = '48px 130px 55px 130px 55px 130px 55px 100px 150px 150px 150px 120px 50px';
  buildNetHeader(COLS);
  applyNetFilters();
}

function highlightNetworkIp(ip) {
  const idx = netData.findIndex(c => c.RemoteAddress === ip);
  if (idx < 0) return;
  const vs = state.vsInstances['net'];
  if (vs) vs.scrollToIndex(idx);
}

function highlightNetworkPid(pid) {
  netFilters.search = String(pid);
  const inp = el('net-search');
  if (inp) inp.value = String(pid);
  applyNetFilters();
}

// Inject row-private style

let dllFilters = { search: '', unsignedOnly: false, privateOnly: false };
let dllSort    = { col: 'ProcessName', dir: 1 };
let dllData    = [];


function renderDlls() {
  const panel = el('panel-dlls');
  const d     = activeData();
  if (!d) { panel.innerHTML = '<div class="solo-notice">No file loaded.</div>'; return; }

  if (!d.DLLs || !d.DLLs.length) {
    panel.innerHTML = '<div class="solo-notice">No DLL data in this JSON.</div>';
    return;
  }

  const COLS = '140px 55px 160px 220px 90px 140px 145px 55px 40px 120px';

  panel.innerHTML = `
    <div class="filter-bar" id="dlls-filter-bar">
