<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a13"/>
      <stop offset="100%" stop-color="#0b1422"/>
    </linearGradient>
    <filter id="glowCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-60%" y="-40%" width="220%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iGlow" x="-80%" y="-40%" width="260%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" rx="10" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <line x1="0" y1="40"  x2="480" y2="40"  stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="80"  x2="480" y2="80"  stroke="#fff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="120" x2="480" y2="120" stroke="#fff" stroke-width="0.3" opacity="0.04"/>

  <!-- ======= ICON (cx=80, cy=80) ======= -->

  <!-- Outer ring: left half cyan (AI), right half orange (IR) -->
  <path d="M 80,17 A 63,63 0 0,0 80,143" fill="none" stroke="#00e5ff" stroke-width="0.9" opacity="0.35"/>
  <path d="M 80,17 A 63,63 0 0,1 80,143" fill="none" stroke="#ff7043" stroke-width="0.9" opacity="0.35"/>

  <!-- Cardinal ticks -->
  <line x1="17"  y1="80" x2="9"   y2="80"  stroke="#00e5ff" stroke-width="1.8" opacity="0.8" filter="url(#subtleGlow)"/>
  <line x1="80"  y1="17" x2="80"  y2="9"   stroke="#00e5ff" stroke-width="1.8" opacity="0.5" filter="url(#subtleGlow)"/>
  <line x1="143" y1="80" x2="151" y2="80"  stroke="#ff7043" stroke-width="1.8" opacity="0.8" filter="url(#subtleGlow)"/>
  <line x1="80"  y1="143" x2="80" y2="151" stroke="#ff7043" stroke-width="1.8" opacity="0.5" filter="url(#subtleGlow)"/>

  <!-- Diagonal ticks -->
  <line x1="35.5"  y1="35.5"  x2="30.8"  y2="30.8"  stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="35.5"  y1="124.5" x2="30.8"  y2="129.2" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <line x1="124.5" y1="35.5"  x2="129.2" y2="30.8"  stroke="#ff7043" stroke-width="1" opacity="0.3"/>
  <line x1="124.5" y1="124.5" x2="129.2" y2="129.2" stroke="#ff7043" stroke-width="1" opacity="0.3"/>

  <!-- Fingerprint arcs transitioning cyan -> orange -->
  <path d="M 65.0,85.5 A 16,16 0 0,1 95.0,85.5"  fill="none" stroke="#00e5ff" stroke-width="1.6" opacity="1.0"  filter="url(#glowCyan)"/>
  <path d="M 53.7,89.6 A 28,28 0 0,1 106.3,89.6" fill="none" stroke="#55c8e0" stroke-width="1.3" opacity="0.80"/>
  <path d="M 42.4,93.7 A 40,40 0 0,1 117.6,93.7" fill="none" stroke="#cc8860" stroke-width="1.1" opacity="0.62"/>
  <path d="M 31.1,97.8 A 52,52 0 0,1 128.9,97.8" fill="none" stroke="#ff7043" stroke-width="0.9" opacity="0.44"/>

  <!-- Crosshair split: left/top = cyan (AI), right/bottom = orange (IR) -->
  <line x1="46" y1="80" x2="80" y2="80"  stroke="#00e5ff" stroke-width="0.7" opacity="0.40"/>
  <line x1="80" y1="80" x2="114" y2="80" stroke="#ff7043" stroke-width="0.7" opacity="0.40"/>
  <line x1="80" y1="48" x2="80"  y2="80" stroke="#00e5ff" stroke-width="0.7" opacity="0.40"/>
  <line x1="80" y1="80" x2="80"  y2="112" stroke="#ff7043" stroke-width="0.7" opacity="0.40"/>

  <!-- AI side: neural circuit nodes (top-left quadrant) -->
  <circle cx="57" cy="60" r="2.2" fill="#00e5ff" opacity="0.7"/>
  <circle cx="68" cy="52" r="1.8" fill="#00e5ff" opacity="0.5"/>
  <line x1="57" y1="60" x2="68" y2="52"  stroke="#00e5ff" stroke-width="0.6" opacity="0.35"/>
  <line x1="57" y1="60" x2="64" y2="72"  stroke="#00e5ff" stroke-width="0.6" opacity="0.30"/>
  <line x1="68" y1="52" x2="80" y2="48"  stroke="#00e5ff" stroke-width="0.6" opacity="0.25"/>

  <!-- IR side: target terminal (bottom-right quadrant) -->
  <circle cx="114" cy="80" r="2.2" fill="#ff7043" opacity="0.7"/>
  <circle cx="105" cy="68" r="1.8" fill="#ff7043" opacity="0.4"/>
  <line x1="114" y1="80" x2="105" y2="68" stroke="#ff7043" stroke-width="0.6" opacity="0.30"/>
  <line x1="80"  y1="112" x2="95" y2="104" stroke="#ff7043" stroke-width="0.6" opacity="0.25"/>

  <!-- Center dot — white core bridging both sides -->
  <circle cx="80" cy="80" r="7"   fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.15"/>
  <circle cx="80" cy="80" r="5"   fill="#0a1520"/>
  <circle cx="80" cy="80" r="3"   fill="#00e5ff" filter="url(#glowCyan)"/>
  <circle cx="80" cy="80" r="1.5" fill="#ffffff"/>

  <!-- ======= TEXT ======= -->

  <!-- "quick" thin, muted -->
  <text
    x="150" y="100"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="52" font-weight="300"
    fill="#7a90a4" letter-spacing="-1.5">quick</text>

  <!-- "A" — silver (AI side) -->
  <text
    x="300" y="100"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="52" font-weight="700"
    fill="#c8dce8" letter-spacing="-1.5">A</text>

  <!-- "i" — cyan, the shared pivot, glowing -->
  <text
    x="330" y="100"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="52" font-weight="700"
    fill="#00e5ff" letter-spacing="-1.5"
    filter="url(#iGlow)">i</text>

  <!-- "R" — orange (IR side) -->
  <text
    x="360" y="100"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="52" font-weight="700"
    fill="#ff7043" letter-spacing="-1.5"
    filter="url(#glowOrange)">R</text>

  <!-- Thin rule -->
  <line x1="150" y1="110" x2="462" y2="110" stroke="#444" stroke-width="0.3" opacity="0.5"/>

  <!-- AI / IR micro-labels -->
  <text x="300" y="124" font-family="'Courier New', monospace" font-size="7.5" fill="#c8dce8" opacity="0.40" letter-spacing="3">AI</text>
  <text x="348" y="124" font-family="'Courier New', monospace" font-size="7.5" fill="#ff7043" opacity="0.40" letter-spacing="3">IR</text>

  <!-- Corner accents: cyan top-right, orange bottom-left -->
  <polyline points="455,10 468,10 468,23" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.25"/>
  <polyline points="12,137 12,150 25,150"  fill="none" stroke="#ff7043" stroke-width="1" opacity="0.25"/>
</svg>
