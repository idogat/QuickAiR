<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quicker</title>
<style>
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --border:  #30363d;
  --accent:  #58a6ff;
  --green:   #3fb950;
  --amber:   #d29922;
  --red:     #f85149;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --blue-hi: #1f3a5c;
  --row-alt: #0d1117;
  --row-hov: #1c2128;
  --expand:  #1a2332;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Consolas','Courier New',monospace;font-size:13px;min-width:1280px;overflow-x:auto}
a{color:var(--accent);cursor:pointer;text-decoration:none}
a:hover{text-decoration:underline}
button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;cursor:pointer;font-family:inherit;font-size:12px;border-radius:3px}
button:hover{border-color:var(--accent);color:var(--accent)}
button.active{background:var(--accent);color:#0d1117;border-color:var(--accent)}
input,select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;font-family:inherit;font-size:12px;border-radius:3px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}

/* TOP BAR */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
#topbar h1{font-size:14px;color:var(--accent);white-space:nowrap}
#topbar .sep{color:var(--border);user-select:none}
#hostSelectorWrap{min-width:160px}
#globalSearch{width:200px}
.badge{background:var(--bg);border:1px solid var(--border);padding:3px 8px;border-radius:3px;font-size:11px;white-space:nowrap}
.badge span{color:var(--accent);font-weight:bold}
.badge.src-badge{color:var(--muted);font-size:10px}
#collectionMeta{color:var(--muted);font-size:11px;white-space:nowrap}

/* TABS */
#tabbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:0}
.tab-btn{background:var(--surface)!important;border:none!important;border-bottom:2px solid transparent!important;padding:8px 20px;color:var(--muted)!important;font-size:13px;border-radius:0;font-family:inherit}
.tab-btn:hover{color:#e6edf3!important;background:var(--surface)!important}
.tab-btn.active{background:var(--accent)!important;color:#fff!important;border-bottom-color:var(--accent)!important}

/* PANELS */
.tab-panel{display:none;padding:12px 16px}
.tab-panel.active{display:block}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filter-bar label{color:var(--muted);font-size:11px;display:flex;align-items:center;gap:4px;cursor:pointer}
.filter-bar input[type=checkbox]{width:14px;height:14px;cursor:pointer}

/* TABLES */
.tbl-wrap{border:1px solid var(--border);border-radius:4px;overflow:hidden}
.tbl-header{display:grid;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0}
.tbl-header .th{padding:6px 8px;color:var(--muted);font-size:11px;cursor:pointer;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-header .th:hover{color:var(--text)}
.tbl-header .th.sort-asc::after{content:' ▲'}
.tbl-header .th.sort-desc::after{content:' ▼'}
.vscroll-viewport{overflow-y:auto;position:relative}
.vscroll-inner{position:relative}
.vrow{display:grid;border-bottom:1px solid #1c2128;cursor:pointer;position:absolute;width:100%;left:0}
.vrow:hover{background:var(--row-hov)}
.vrow.selected{background:var(--blue-hi)}
.vrow.highlighted{background:#2d2a1c}
.td{padding:5px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.td.mono{font-family:'Consolas','Courier New',monospace}
.td.dim{color:var(--muted)}
.td.green{color:var(--green)}
.td.amber{color:var(--amber)}
.td.red{color:var(--red)}
.td.accent{color:var(--accent)}
.td.link{color:var(--accent);cursor:pointer}
.td.link:hover{text-decoration:underline}

/* EXPAND DETAIL */
.expand-row{background:var(--expand);border-left:3px solid var(--accent);border-bottom:1px solid var(--border);padding:10px 16px;font-size:12px}
.expand-row .kv-grid{display:grid;grid-template-columns:180px 1fr;gap:4px 12px;margin-bottom:8px}
.expand-row .kv-grid .k{color:var(--muted)}
.expand-row .kv-grid .v{word-break:break-all}
.expand-row h4{color:var(--muted);font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.expand-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.expand-tbl th{color:var(--muted);padding:3px 8px;text-align:left;border-bottom:1px solid var(--border)}
.expand-tbl td{padding:3px 8px;border-bottom:1px solid #1c2128;word-break:break-all}
.expand-tbl tr:hover td{background:var(--row-hov)}

/* FLEET */
#fleet-table .tbl-header{grid-template-columns:36px 180px 200px 60px 50px 110px 80px 100px 100px 80px 60px 120px 80px}
#fleet-table .vrow{grid-template-columns:36px 180px 200px 60px 50px 110px 80px 100px 100px 80px 60px 120px 80px}

/* MANIFEST PANEL */
#manifest-panel .mp-wrap{border:1px solid var(--border);border-radius:4px;overflow:hidden}
#manifest-panel .mp-title{padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
#manifest-panel .mp-title span{color:var(--accent)}
#manifest-panel .mp-body{padding:10px 16px;font-size:12px}
#manifest-panel .mp-grid{display:grid;grid-template-columns:220px 1fr;gap:4px 12px}
#manifest-panel .mp-grid .k{color:var(--muted)}
#manifest-panel .mp-grid .v{word-break:break-all}
#manifest-panel .mp-errors{margin-top:8px}
#manifest-panel .mp-err-item{padding:3px 8px;background:#2d1f1f;border:1px solid var(--red);border-radius:3px;margin-bottom:4px;font-size:11px;color:var(--red)}

/* REMOTE IP SUMMARY */
#ip-summary{margin-top:12px;border:1px solid var(--border);border-radius:4px;overflow:hidden}
#ip-summary h3{padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
#ip-summary-tbl{width:100%;border-collapse:collapse;font-size:12px}
#ip-summary-tbl th{color:var(--muted);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface)}
#ip-summary-tbl td{padding:4px 8px;border-bottom:1px solid #1c2128}
#ip-summary-tbl tr:hover td{background:var(--row-hov)}
#ip-summary-tbl .ip-in-dns{color:var(--green)}

/* DNS CORR SUMMARY */
#dns-corr-summary{margin-bottom:10px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-size:12px;color:var(--muted)}
#dns-corr-summary span{color:var(--accent)}

/* BANNERS */
.banner{padding:6px 12px;border-radius:4px;margin-bottom:10px;font-size:12px}
.banner.warn{background:#2d2a1c;border:1px solid var(--amber);color:var(--amber)}
.banner.info{background:#1a2332;border:1px solid var(--accent);color:var(--accent)}

/* PROGRESS */
#progress-overlay{display:none;position:fixed;inset:0;background:rgba(13,17,23,.85);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#progress-overlay.show{display:flex}
#progress-bar-wrap{width:320px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
#progress-bar{height:100%;background:var(--accent);width:0%;transition:width .15s}
#progress-label{color:var(--text);font-size:13px}

/* GLOBAL SEARCH RESULTS */
#gsearch-panel{display:none;position:fixed;top:48px;right:16px;width:520px;max-height:60vh;background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow-y:auto;z-index:150;box-shadow:0 8px 24px rgba(0,0,0,.6)}
#gsearch-panel.show{display:block}
#gsearch-panel .gs-section{padding:6px 12px 2px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;border-top:1px solid var(--border)}
#gsearch-panel .gs-section:first-child{border-top:none}
#gsearch-panel .gs-row{padding:5px 12px;cursor:pointer;border-bottom:1px solid #1c2128;font-size:12px}
#gsearch-panel .gs-row:hover{background:var(--row-hov)}
#gsearch-panel .gs-row .gs-main{color:var(--text)}
#gsearch-panel .gs-row .gs-sub{color:var(--muted);font-size:11px}
#gsearch-panel .gs-empty{padding:12px;color:var(--muted);text-align:center}

/* DROP ZONE */
#drop-zone{display:none;position:fixed;inset:0;background:rgba(88,166,255,.08);border:3px dashed var(--accent);z-index:300;align-items:center;justify-content:center;font-size:18px;color:var(--accent)}
#drop-zone.show{display:flex}

/* SINGLE-HOST NOTICE */
.solo-notice{padding:16px;color:var(--muted);font-size:12px;text-align:center}
/* PLACEHOLDER */
#placeholder{display:none;position:fixed;inset:0;background:var(--bg);z-index:50;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#placeholder.show{display:flex}
#placeholder h2{color:var(--muted);font-size:16px}
#placeholder p{color:var(--muted);font-size:13px}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* EXECUTION DIALOG */
#exec-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400}
#exec-modal-backdrop.show{display:block}
#exec-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:401;background:var(--surface);border:1px solid var(--border);border-radius:6px;width:600px;max-width:96vw;box-shadow:0 16px 48px rgba(0,0,0,.7)}
#exec-modal.show{display:block}
#exec-modal .em-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);border-radius:6px 6px 0 0}
#exec-modal .em-title{color:var(--accent);font-size:13px;font-weight:bold}
#exec-modal .em-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
#exec-modal .em-close:hover{color:var(--text)}
#exec-modal .em-body{padding:14px 16px}
#exec-modal .em-field{display:grid;grid-template-columns:130px 1fr;align-items:center;gap:6px;margin-bottom:10px}
#exec-modal .em-field label{color:var(--muted);font-size:12px;text-align:right;padding-right:8px}
#exec-modal .em-field input,#exec-modal .em-field select{width:100%}
#exec-modal .em-actions{display:flex;gap:8px;justify-content:flex-end;padding:10px 16px;border-top:1px solid var(--border)}
#exec-modal .em-btn-copy{background:var(--accent);border-color:var(--accent);color:#0d1117}
#exec-modal .em-btn-copy:hover{opacity:.85}
#exec-modal .em-cmd{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:'Consolas','Courier New',monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;user-select:all;cursor:text;color:var(--green);margin-bottom:10px}
#exec-modal .em-cmd-note{color:var(--muted);font-size:11px;margin-bottom:6px}
.fleet-exec-btn{font-size:11px;padding:2px 7px;color:var(--accent);border-color:var(--accent)}
.fleet-exec-btn:hover{background:var(--accent);color:#0d1117}
.net-collect-btn{font-size:11px;padding:3px 9px;margin-right:6px}

/* BULK SELECTION — EXECUTE TAB */
.exec-cb-col{width:32px;text-align:center;padding:4px 6px!important}
.exec-type-col{width:52px;text-align:center;padding:4px 6px!important}
.exec-host-tbl tr.exec-sel-row>td{border-left:3px solid var(--accent)}
.exec-host-tbl tr:not(.exec-sel-row)>td:first-child{border-left:3px solid transparent}
.exec-th-toggle{cursor:pointer;user-select:none}
.exec-th-toggle:hover{color:var(--text)}
.exec-bulk-bar{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding:0 2px}
.exec-bulk-left{display:flex;align-items:center;gap:10px}
.exec-sel-counter{font-size:12px;color:var(--muted)}
.exec-add-queue-btn{background:var(--accent);border-color:var(--accent);color:#0d1117;font-size:12px;padding:4px 12px}
.exec-add-queue-btn:disabled{opacity:.35;cursor:not-allowed}

/* QUEUE PREVIEW MODAL */
#queue-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400}
#queue-modal-backdrop.show{display:block}
#queue-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:401;background:var(--surface);border:1px solid var(--border);border-radius:6px;width:700px;max-width:96vw;max-height:90vh;overflow:hidden;display:none;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.7)}
#queue-modal.show{display:flex}
#queue-modal .qm-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);border-radius:6px 6px 0 0;flex-shrink:0}
#queue-modal .qm-title{color:var(--accent);font-size:13px;font-weight:bold}
#queue-modal .qm-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}
#queue-modal .qm-close:hover{color:var(--text)}
#queue-modal .qm-body{padding:14px 16px;overflow-y:auto;flex:1;min-height:0}
#queue-modal .qm-job-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;margin-bottom:14px}
#queue-modal .qm-job-tbl{width:100%;border-collapse:collapse;font-size:12px}
#queue-modal .qm-job-tbl th{text-align:left;padding:4px 10px;color:var(--muted);font-weight:normal;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0}
#queue-modal .qm-job-tbl td{padding:4px 10px;border-bottom:1px solid var(--border)}
#queue-modal .qm-job-tbl tr:last-child td{border-bottom:none}
#queue-modal .qm-field{display:grid;grid-template-columns:150px 1fr;align-items:center;gap:6px;margin-bottom:10px}
#queue-modal .qm-field label{color:var(--muted);font-size:12px;text-align:right;padding-right:8px}
#queue-modal .qm-field input,#queue-modal .qm-field select{width:100%}
#queue-modal .qm-section-title{font-size:11px;color:var(--muted);font-weight:bold;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px 0;border-bottom:1px solid var(--border);padding-bottom:4px}
#queue-modal .qm-actions{display:flex;gap:8px;justify-content:flex-end;padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0}
#queue-modal .qm-btn-launch{background:var(--accent);border-color:var(--accent);color:#0d1117}
#queue-modal .qm-btn-launch:hover{opacity:.85}
#queue-modal .qm-success{background:rgba(63,185,80,.1);border:1px solid var(--green);border-radius:4px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--green)}
#queue-modal .qm-settings-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:4px}
#queue-modal .qm-settings-tbl th{text-align:left;padding:4px 6px;color:var(--muted);font-weight:normal;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;font-size:11px}
#queue-modal .qm-settings-tbl td{padding:3px 4px;border-bottom:1px solid var(--border)}
#queue-modal .qm-settings-tbl input,#queue-modal .qm-settings-tbl select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:3px 5px;font-size:11px;box-sizing:border-box}
#queue-modal .qm-settings-tbl input:focus,#queue-modal .qm-settings-tbl select:focus{border-color:var(--accent);outline:none}
#queue-modal .qm-settings-tbl td.qm-cell-host,#queue-modal .qm-settings-tbl td.qm-cell-type{font-size:12px;white-space:nowrap;padding:3px 6px}
#queue-modal .qm-settings-wrap{max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:4px}

/* COLUMN RESIZE */
.tbl-header .th{position:relative;user-select:none}
.tbl-header .th:last-child{overflow:visible}
.resizer{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;z-index:10;border-right:2px solid var(--border);transition:border-color .15s ease,background .15s ease}
.resizer:hover{border-right:2px solid var(--accent);background:rgba(88,166,255,0.15)}
.resizer.resizing{border-right:2px solid var(--accent);background:rgba(88,166,255,0.3)}
.tbl-header .th:last-child .resizer{right:0}

/* ROW HIGHLIGHT (cross-reference navigation) */
@keyframes rowPulse{0%{background:rgba(88,166,255,0.35)}50%{background:rgba(88,166,255,0.6)}100%{background:rgba(88,166,255,0.35)}}
.row-highlight{background:rgba(88,166,255,0.35)!important;border-left:4px solid var(--accent)!important;outline:1px solid var(--accent);box-shadow:inset 0 0 0 1px var(--accent);animation:rowPulse 0.6s ease 2}
.row-highlight.fade{background:transparent!important;border-left:4px solid transparent!important;outline:none;box-shadow:none;transition:all 1.5s ease}

</style>
</head>
